spring.application.name=eta_app
debug=true

# ============================
# GOOGLE LOGIN (usa env vars)   
# ============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.client-name=Google

# ============================
# DATASOURCE (usa env vars)
# ============================
spring.datasource.url=jdbc:mysql://localhost:3306/eta_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=estudiante
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#spring.datasource.url=jdbc:mysql://34.45.90.115:3306/eta_db?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
spring.datasource.username=root
#spring.datasource.password=Deivi$123
# spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
# spring.datasource.username=${SPRING_DATASOURCE_USERNAME}

# ============================
# JPA
# ============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ============================
# DOCKER Uploads
# ============================
# Uploads (ruta dentro del contenedor)
app.upload.dir=/app/uploads
# ============================
# SERVER
# ============================
server.port=8080

server.servlet.session.cookie.name=CookieEta
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.timeout=30m




spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================
# EMAIL / SMTP
# ============================
# Configuración para Gmail (usar App Password, no la contraseña normal)
# Para generar App Password: https://myaccount.google.com/apppasswords
# NOTA: La App Password de Gmail se escribe CON espacios (ej: "hfja nmmu eurt lnjh")

spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:equipodeeta@gmail.com}
spring.mail.password=${SMTP_PASSWORD:hfja nmmu eurt lnjh}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# URL base de la aplicación (para links en emails)
app.base-url=${APP_BASE_URL:https://etaappia-p5st.onrender.com}

# ⚠️ MODO PAGO: Controla si se usa pasarela de pago o reserva directa
# true  = Redirige a Wompi para pagar (requiere credenciales reales y configuración en panel Wompi)
# false = Crea reserva directamente SIN PAGO (modo desarrollo/demo)
pago.enabled=${PAGO_ENABLED:false}

# Alternativas SMTP:
# SendGrid: smtp.sendgrid.net, puerto 587
# Mailgun: smtp.mailgun.org, puerto 587
# Outlook: smtp-mail.outlook.com, puerto 587
# Yahoo: smtp.mail.yahoo.com, puerto 465 (SSL)



# ============================
# ChatBot IA - ETA Assistant
# ============================
# Proveedor activo: "openai" | "anthropic" | "groq"
# Nota: Gemini requiere dependencias adicionales no disponibles en Spring AI 1.0.0
eta.chat.provider=groq

# Groq (Llama 3, etc.)
eta.chat.groq.api-key=${GROQ_API_KEY}
eta.chat.groq.model=llama-3.1-8b-instant
eta.chat.groq.base-url=https://api.groq.com/openai
eta.chat.groq.temperature=0.7
eta.chat.groq.max-tokens=500

# OpenAI
spring.ai.openai.api-key=${OPENAI_API_KEY:sk-placeholder}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=500

# Anthropic (Claude)
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY:sk-ant-placeholder}
spring.ai.anthropic.chat.options.model=claude-haiku-4-5-20251001
spring.ai.anthropic.chat.options.temperature=0.7
spring.ai.anthropic.chat.options.max-tokens=500


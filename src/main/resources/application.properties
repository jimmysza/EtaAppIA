spring.application.name=eta_app

# ============================
# GOOGLE LOGIN (usa env vars)   
# ============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.client-name=Google

# ============================
# DATASOURCE (usa env vars)
# ============================
spring.datasource.url=jdbc:mysql://localhost:3306/eta_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Jaime12.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
# spring.datasource.username=${SPRING_DATASOURCE_USERNAME}

# ============================
# JPA
# ============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ============================
# THYMELEAF
# ============================

# ============================
# SERVER
# ============================
server.port=8080

server.servlet.session.cookie.name=CookieEta
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.timeout=30m




spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB



spring.web.resources.static-locations=classpath:/static/



spring.devtools.livereload.enabled=true
spring.devtools.restart.enabled=true
spring.thymeleaf.cache=false
spring.web.resources.cache.period=0

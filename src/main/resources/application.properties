spring.application.name=eta_app

# ============================
# GOOGLE LOGIN (usa env vars)   
# ============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.client-name=Google

# ============================
# DATASOURCE (usa env vars)
# ============================
spring.datasource.url=jdbc:mysql://localhost:3306/eta_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=sanchez
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
# spring.datasource.username=${SPRING_DATASOURCE_USERNAME}

# ============================
# JPA
# ============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ============================
# THYMELEAF
# ============================

# ============================
# SERVER
# ============================
server.port=8080

server.servlet.session.cookie.name=CookieEta
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.timeout=30m




spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB



spring.web.resources.static-locations=classpath:/static/


spring.devtools.livereload.enabled=true
spring.devtools.restart.enabled=true



spring.web.resources.cache.period=0
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true


spring.output.ansi.enabled=always


logging.pattern.console=%clr(%d{HH:mm:ss}){green} %clr(%5p) %clr(${PID}){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} : %msg%n

# ============================
# EMAIL (SMTP) + VERIFICACION
# ============================
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# URL base usada para construir enlaces de verificacion
app.base-url=${APP_BASE_URL:http://localhost:8080}
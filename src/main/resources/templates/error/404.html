<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>404</title>
    <link rel="icon" th:href="@{/images/logos/Logo.webp}" type="image/x-icon" />
    <link rel="stylesheet" th:href="@{/css/error.css}">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="icon" th:href="@{/images/logos/isotipo.webp}" type="image/x-icon" />
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(39deg, rgba(26, 182, 217, 1) 0%, rgba(56, 149, 199, 1) 44%, rgba(79, 158, 207, 1) 59%, rgba(141, 181, 227, 1) 100%);
            font-family: 'Inter', sans-serif;
        }

        .error-modal {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 10px;
            position: relative;
        }

        h1 {
            font-size: 150px;
            font-weight: bold;
            color: white;
            margin: 0;
        }

        p {
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }

        a {
            padding: 8px 16px;
            border-radius: 12px;
            background-color: #021024;
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        img {
            position: absolute;
            top: 165px;
            transform: translateY(-50%);
            z-index: 10;
            width: 80px;
            height: 80px;
        }
    </style>
</head>

<body>
    <div class="error-modal">
        <img th:src="@{/images/logos/etawhitervg.webp}" alt="">
        <h1>404</h1>
        <p>La Pagina no fue Encontrada</p>
        <a th:href="@{/}">Volver al inicio</a>
    </div>
</body>

</html>

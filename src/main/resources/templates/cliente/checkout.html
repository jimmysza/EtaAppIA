<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Reservar Actividad</title>
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/componentes/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/cliente/checkout.css}">


    <link rel="icon" th:href="@{/images/logos/Logo.webp}" type="image/x-icon" />
</head>

<body>
    <div th:replace="~{componentes/navbar :: navbar}"></div>


    <div th:if="${error}"
        style="background-color:#f8d7da;color:#842029;padding:12px;border-radius:8px;text-align:center;margin:20px 0;font-weight:bold;">
        <span th:text="${error}"></span>
    </div>
    <main class="checkout-page">

        <form th:action="@{/cliente/reservar}" method="post">


            <input type="hidden" name="idDisponibilidad" th:value="${disponibilidad.idDisponibilidad}">
            <input type="hidden" name="idActividad" th:value="${actividad.idActividad}">
            

            <div class="productos">
                <a th:href="@{/detalle/{id}(id=${actividad.idActividad})}" class="button-default">Volver</a>
                <h1 th:text="'Reservar: ' + ${actividad.titulo}"></h1>
                <h2>Detalles de tu reserva</h2>

                <div class="form-group">
                <label>Cantidad de cupos:</label>
                <input type="number" name="cantidad" min="1" th:max="${disponibilidad.cuposDisponibles}" th:value="${reservaDTO != null ? reservaDTO.cantidad : null}" required />
                <p>Cupos disponibles: <strong th:text="${disponibilidad.cuposDisponibles}"></strong></p>
            </div>



            </div>

            
            <div class="resumen">
                <h2>Casi terminas…</h2>

                <div class="informacion-resumen">
                    <p>Precio unitario: <span id="precio" th:text="${actividad.precio}"></span></p>
                    <p>Total a pagar: <span id="total">$0</span></p>
                </div>

                <button type="submit">Confirmar Reserva</button>
            </div>
        </form>

    </main>


    <script th:inline="javascript">
        const precio = /*[[${actividad.precio}]]*/ 0;
        const inputCupos = document.querySelector("[name='cantidad']");
        const totalSpan = document.getElementById("total");

        function actualizarTotal() {
            const cantidad = parseInt(inputCupos.value) || 0;
            const total = cantidad * precio;
            totalSpan.textContent = total.toLocaleString('es-CO', {
                style: 'currency',
                currency: 'COP'
            });
        }

        inputCupos.addEventListener("input", actualizarTotal);
    </script>


</body>

</html>

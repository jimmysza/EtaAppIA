<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Clientes</title>
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="icon" th:href="@{/images/logos/isotipo.webp}" type="image/x-icon" />
    <link rel="stylesheet" th:href="@{/css/adminBd.css}">
    <link rel="stylesheet" th:href="@{/css/auth/register.css}">
    <link rel="stylesheet" th:href="@{/css/cliente/dahsboard-cliente.css}">
    <script src="https://unpkg.com/feather-icons"></script>

    <link rel="stylesheet" th:href="@{/css/tailwind.css}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="icon" th:href="@{/images/logos/logo.webp}" type="image/x-icon" />
</head>

<body>

    <div th:if="${exito}" class="alert alert-success" role="alert">
        <p th:text="${exito}"></p>
    </div>
    <div th:if="${error}" class="alert alert-danger" role="alert">
        <p th:text="${error}"></p>
    </div>

    <section class="container-manager ">
        <div th:replace="~{componentes/sideBarCliente :: sideBarCliente}"></div>


        <main class="main-content">

            <div class="header_db">

                <div class="flex gap-3">
                    <svg id="hideBar" class="hidebar-dashboard" xmlns="http://www.w3.org/2000/svg" width="24"
                        height="24" viewBox="0 0 24 24">
                        <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                            stroke-width="1.5"
                            d="M15 3.5v17M3 9.4c0-2.24 0-3.36.436-4.216a4 4 0 0 1 1.748-1.748C6.04 3 7.16 3 9.4 3h5.2c2.24 0 3.36 0 4.216.436a4 4 0 0 1 1.748 1.748C21 6.04 21 7.16 21 9.4v5.2c0 2.24 0 3.36-.436 4.216a4 4 0 0 1-1.748 1.748C17.96 21 16.84 21 14.6 21H9.4c-2.24 0-3.36 0-4.216-.436a4 4 0 0 1-1.748-1.748C3 17.96 3 16.84 3 14.6z" />
                    </svg>
                    <nav aria-label="Breadcrumb">
                        <ol class="breadcrumbs" itemscope itemtype="https://schema.org/BreadcrumbList">
                            <li itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
                                <a itemprop="item" href="/">
                                    <span itemprop="name">Inicio</span>
                                </a>
                                <meta itemprop="position" content="1" />
                            </li>

                            <li itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
                                <a itemprop="item" href="/">
                                    <span itemprop="name">Informacion Personal</span>
                                </a>
                                <meta itemprop="position" content="2" />
                            </li>

                        </ol>
                    </nav>

                </div>
            </div>

            <div class="actualizar-root">



                <h1 class="p-bold">Actualiza tu informacion personal</h1>


                <div th:if="${param.exito}" class="alert alert-success" id="mensajeExito">
                    <span th:text="${exito}"></span>
                </div>

                <form th:action="@{/cliente/actualizar/{id}(id=${cliente.id})}" th:object="${cliente}" method="post">

                    <!--nombre-->
                    <div class="input div1">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 26 26">
                            <path fill="#BFC2CF"
                                d="M16.563 15.9c-.159-.052-1.164-.505-.536-2.414h-.009c1.637-1.686 2.888-4.399 2.888-7.07c0-4.107-2.731-6.26-5.905-6.26c-3.176 0-5.892 2.152-5.892 6.26c0 2.682 1.244 5.406 2.891 7.088c.642 1.684-.506 2.309-.746 2.397c-3.324 1.202-7.224 3.393-7.224 5.556v.811c0 2.947 5.714 3.617 11.002 3.617c5.296 0 10.938-.67 10.938-3.617v-.811c0-2.228-3.919-4.402-7.407-5.557"
                                stroke-width="0.5" stroke="#BFC2CF" />
                        </svg>
                        <input type="text" placeholder="nombre" id="nombre" th:field="*{usuario.nombre}" required>
                    </div>
                    <!--Cedula-->
                    <div class="input div2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 15 15">
                            <path fill="#BFC2CF" fill-rule="evenodd"
                                d="M0 3.5A1.5 1.5 0 0 1 1.5 2h12A1.5 1.5 0 0 1 15 3.5v8a1.5 1.5 0 0 1-1.5 1.5h-12A1.5 1.5 0 0 1 0 11.5zM3 6a2 2 0 1 1 4 0a2 2 0 0 1-4 0m9 0H9V5h3zm0 3H9V8h3zM5 9a2.93 2.93 0 0 0-2.618 1.618l-.33.658A.5.5 0 0 0 2.5 12h5a.5.5 0 0 0 .447-.724l-.329-.658A2.93 2.93 0 0 0 5 9"
                                clip-rule="evenodd" stroke-width="0.2" stroke="#000" />
                        </svg>


                        <input type="number" id="cedula" th:field="*{cedula}" placeholder="cedula" required>
                    </div>

                    <!--email-->
                    <div class="div3 input">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                            <path fill="#BFC2CF"
                                d="M22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2zm-2 0l-8 5l-8-5zm0 12H4V8l8 5l8-5z" />
                        </svg>
                        <input type="email" id="email" th:field="*{usuario.email}" placeholder="email" required>
                    </div>

                    <!--telefono-->
                    <div class="input div4">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                            <path fill="#BFC2CF"
                                d="m19.23 15.26l-2.54-.29a1.99 1.99 0 0 0-1.64.57l-1.84 1.84a15.05 15.05 0 0 1-6.59-6.59l1.85-1.85c.43-.43.64-1.03.57-1.64l-.29-2.52a2 2 0 0 0-1.99-1.77H5.03c-1.13 0-2.07.94-2 2.07c.53 8.54 7.36 15.36 15.89 15.89c1.13.07 2.07-.87 2.07-2v-1.73c.01-1.01-.75-1.86-1.76-1.98"
                                stroke-width="0.5" stroke="#BFC2CF" />
                        </svg>
                        <input placeholder="Telefono" type="number" name="telefono" th:field="*{usuario.telefono}"
                            required minlength="7" maxlength="100000000000">
                    </div>

                    <!--Direccion-->
                    <div class="input div5">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                            <path fill="#BFC2CF"
                                d="M12 11.5A2.5 2.5 0 0 1 9.5 9A2.5 2.5 0 0 1 12 6.5A2.5 2.5 0 0 1 14.5 9a2.5 2.5 0 0 1-2.5 2.5M12 2a7 7 0 0 0-7 7c0 5.25 7 13 7 13s7-7.75 7-13a7 7 0 0 0-7-7"
                                stroke-width="0.5" stroke="#BFC2CF" />
                        </svg>
                        <input type="text" id="direccion" name="direccion" th:value="${cliente.direccion}"
                            placeholder="Direccion" required>
                    </div>

                    <div class="input div6">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                            <g fill="none">
                                <path fill="#BFC2CF"
                                    d="M17.36 20H8V10c.625 0 1.208-.312 1.555-.832l2.554-3.832A3 3 0 0 1 14.606 4h.213a1 1 0 0 1 .987 1.164L15 10h3.56a2 2 0 0 1 1.962 2.392l-1.2 6A2 2 0 0 1 17.36 20"
                                    opacity="0.16" />
                                <path fill="#BFC2CF"
                                    d="m15 10l-.986-.164A1 1 0 0 0 15 11zM4 10V9a1 1 0 0 0-1 1zm16.522 2.392l.98.196zM6 21h11.36v-2H6zM18.56 9H15v2h3.56zm-2.574 1.164l.806-4.835L14.82 5l-.805 4.836zM14.82 3h-.213v2h.213zm-3.542 1.781L8.762 8.555l1.664 1.11L12.94 5.89zM7.93 9H4v2h3.93zM3 10v8h2v-8zm17.302 8.588l1.2-6l-1.961-.392l-1.2 6zM8.762 8.555A1 1 0 0 1 7.93 9v2a3 3 0 0 0 2.496-1.336zm8.03-3.226A2 2 0 0 0 14.82 3v2zM18.56 11a1 1 0 0 1 .981 1.196l1.961.392A3 3 0 0 0 18.56 9zm-1.2 10a3 3 0 0 0 2.942-2.412l-1.961-.392a1 1 0 0 1-.98.804zM14.606 3a4 4 0 0 0-3.329 1.781l1.665 1.11A2 2 0 0 1 14.606 5zM6 19a1 1 0 0 1-1-1H3a3 3 0 0 0 3 3z" />
                                <path stroke="#BFC2CF" stroke-width="2" d="M8 10v10" />
                            </g>
                        </svg>
                        <textarea id="preferencias" placeholder="preferencias" name="preferencias"
                            th:text="${cliente.preferencias}" required></textarea>

                    </div>


                    <!--password-->


                    <!--9 submit-->
                    <button type="submit" class="login-button div9">Actualizar</button>

                </form>
            </div>
        </main>
    </section>

    <script th:src="@{/js/alert.js}"></script>
    <script th:src="@{/js/contraseñaMostrar.js}"></script>
    <script th:src="@{/js/dashboard.js}"></script>
</body>

</html>

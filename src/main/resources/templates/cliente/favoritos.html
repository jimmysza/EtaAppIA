<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Favoritos</title>

    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="icon" th:href="@{/images/logos/isotipo.webp}" type="image/x-icon" />
    <link rel="stylesheet" th:href="@{/css/cliente/dahsboard-cliente.css}">
    <link rel="stylesheet" th:href="@{/css/adminBd.css}">

    <link rel="stylesheet" th:href="@{/css/tailwind.css}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <link rel="icon" th:href="@{/images/logos/logo.webp}" type="image/x-icon" />

    <style>
        .card-image {
            transition: transform 0.3s ease;
        }

        .card:hover .card-image {
            transform: scale(1.05);
        }

        .card-calificacion {
            position: absolute;
            bottom: 8px;
            left: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(255, 255, 255, 0.95);
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <section class="container-manager">
        <div th:replace="~{componentes/sideBarCliente :: sideBarCliente}"></div>

        <main class="main-content">

            <div class="header_db">
                <div class="flex gap-3">
                    <svg id="hideBar" class="hidebar-dashboard" xmlns="http://www.w3.org/2000/svg" width="24"
                        height="24" viewBox="0 0 24 24">
                        <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                            stroke-width="1.5"
                            d="M15 3.5v17M3 9.4c0-2.24 0-3.36.436-4.216a4 4 0 0 1 1.748-1.748C6.04 3 7.16 3 9.4 3h5.2c2.24 0 3.36 0 4.216.436a4 4 0 0 1 1.748 1.748C21 6.04 21 7.16 21 9.4v5.2c0 2.24 0 3.36-.436 4.216a4 4 0 0 1-1.748 1.748C17.96 21 16.84 21 14.6 21H9.4c-2.24 0-3.36 0-4.216-.436a4 4 0 0 1-1.748-1.748C3 17.96 3 16.84 3 14.6z" />
                    </svg>
                    <nav aria-label="Breadcrumb">
                        <ol class="breadcrumbs" itemscope itemtype="https://schema.org/BreadcrumbList">
                            <li itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
                                <a itemprop="item" href="/">
                                    <span itemprop="name">Inicio</span>
                                </a>
                                <meta itemprop="position" content="1" />
                            </li>
                            <li itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
                                <a itemprop="item" class="text-blue-600 font-bold">
                                    <span itemprop="name">Favoritos</span>
                                </a>
                                <meta itemprop="position" content="2" />
                            </li>
                        </ol>
                    </nav>
                </div>
            </div>

            <div class="flex justify-end px-1 mb-4">
                <a th:href="@{/cliente/dashboard}"
                    class="inline-flex items-center gap-2 rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-semibold text-slate-700 shadow-sm transition hover:border-slate-300 hover:text-slate-950 hover:shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 18l-6-6 6-6" />
                    </svg>
                    Volver al dashboard
                </a>
            </div>

            <div class="filtro_db">
                <div class="Identifier-Dashboard">
                    <div class="svg-contain">
                        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24">
                            <path fill="#ef4444"
                                d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"
                                stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </div>
                    <div class="id-content">
                        <h1>Mis Favoritos</h1>
                        <p>Tus actividades guardadas</p>
                    </div>
                </div>
            </div>

            <!-- Sin favoritos -->
            <div th:if="${actividades == null or #lists.isEmpty(actividades)}"
                class="flex flex-col items-center justify-center py-20">
                <svg class="w-20 h-20 text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                </svg>
                <p class="text-gray-500 text-xl font-semibold">Aún no tienes actividades favoritas</p>
                <p class="text-gray-400 mt-2">Explora y guarda las actividades que más te gusten</p>
                <a th:href="@{/}"
                    class="mt-6 bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-6 rounded-lg transition-colors">
                    Explorar actividades
                </a>
            </div>

            <!-- Grid de favoritos -->
            <div th:if="${actividades != null and !#lists.isEmpty(actividades)}"
                class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 p-6">

                <a class="card group cursor-pointer rounded-xl" th:each="actividad : ${actividades}"
                    th:href="@{/actividad/{slug}-{id}(slug=${#strings.replace(#strings.toLowerCase(actividad.titulo),' ', '-')},id=${actividad.idActividad})}">

                    <div class="relative rounded-xl overflow-hidden mb-3">
                        <!-- IMAGEN -->
                        <img th:if="${actividad.imagen != null}" th:src="@{'/uploads/' + ${actividad.imagen}}"
                            alt="Imagen de la actividad" class="card-image w-full h-64 object-cover">

                        <span class="card-calificacion">
                            <svg xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 24 24">
                                <path fill="#F59E0B"
                                    d="m12 17.275l-4.15 2.5q-.275.175-.575.15t-.525-.2t-.35-.437t-.05-.588l1.1-4.725L3.775 10.8q-.25-.225-.312-.513t.037-.562t.3-.45t.55-.225l4.85-.425l1.875-4.45q.125-.3.388-.45t.537-.15t.537.15t.388.45l1.875 4.45l4.85.425q.35.05.55.225t.3.45t.038.563t-.313.512l-3.675 3.175l1.1 4.725q.075.325-.05.588t-.35.437t-.525.2t-.575-.15z"
                                    stroke-width="0.2" stroke="#F59E0B" />
                            </svg>
                            <span
                                th:text="${actividad.calificacion != null ? actividad.calificacion : 'Sin calificacion'}">
                            </span>
                            <span class="text-xs text-gray-400">
                                (<span th:text="${actividad.cantidadComentario}"></span>)
                            </span>
                        </span>

                        <!-- Botón quitar de favoritos -->
                        <button type="button"
                            class="btn-fav absolute top-3 right-3 w-8 h-8 bg-white/90 hover:bg-white rounded-full flex items-center justify-center shadow-sm hover:scale-110 transition-transform"
                            th:data-id="${actividad.idActividad}"
                            onclick="event.preventDefault(); event.stopPropagation(); toggleFav(this);">
                            <svg class="w-5 h-5 text-red-500" fill="currentColor" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                            </svg>
                        </button>

                        <!-- CATEGORÍA -->
                        <div class="absolute top-3 left-3 bg-white px-3 py-1 rounded-lg text-xs font-semibold"
                            th:text="${actividad.nombreCategoria}">
                        </div>
                    </div>

                    <div class="pb-2 px-2">
                        <h3 class="font-semibold text-gray-900 mb-1 line-clamp-1" th:text="${actividad.titulo}"></h3>
                        <div class="flex items-center gap-1">
                            <p class="text-sm text-blue-600 mb-1 font-bold"
                                th:text="${#numbers.formatDecimal(precioConsumidor, 0, 'POINT', 0, 'COMMA')}"></p>
                        </div>
                        <div class="flex items-center gap-1">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24">
                                <g fill="none">
                                    <path
                                        d="m12.593 23.258l-.011.002l-.071.035l-.02.004l-.014-.004l-.071-.035q-.016-.005-.024.005l-.004.01l-.017.428l.005.02l.01.013l.104.074l.015.004l.012-.004l.104-.074l.012-.016l.004-.017l-.017-.427q-.004-.016-.017-.018m.265-.113l-.013.002l-.185.093l-.01.01l-.003.011l.018.43l.005.012l.008.007l.201.093q.019.005.029-.008l.004-.014l-.034-.614q-.005-.018-.02-.022m-.715.002a.02.02 0 0 0-.027.006l-.006.014l-.034.614q.001.018.017.024l.015-.002l.201-.093l.01-.008l.004-.011l.017-.43l-.003-.012l-.01-.01z" />
                                    <path fill="#23AAE3"
                                        d="M12 2a9 9 0 0 1 9 9c0 3.074-1.676 5.59-3.442 7.395a20.4 20.4 0 0 1-2.876 2.416l-.426.29l-.2.133l-.377.24l-.336.205l-.416.242a1.87 1.87 0 0 1-1.854 0l-.416-.242l-.52-.32l-.192-.125l-.41-.273a20.6 20.6 0 0 1-3.093-2.566C4.676 16.589 3 14.074 3 11a9 9 0 0 1 9-9m0 6a3 3 0 1 0 0 6a3 3 0 0 0 0-6"
                                        stroke-width="0.2" stroke="#23AAE3" />
                                </g>
                            </svg>
                            <span class="text-sm font-semibold text-gray-900" th:text="${actividad.ubicacion}"></span>
                        </div>
                    </div>
                </a>
            </div>

        </main>
    </section>

    <script>
        function toggleFav(btn) {
            const id = btn.getAttribute('data-id');
            fetch('/cliente/favorito/toggle/' + id, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
                .then(res => res.json())
                .then(data => {
                    if (!data.favorito) {
                        // Se eliminó: quitar la card del DOM
                        const card = btn.closest('.card');
                        card.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
                        card.style.opacity = '0';
                        card.style.transform = 'scale(0.95)';
                        setTimeout(() => card.remove(), 300);
                    }
                })
                .catch(err => console.error('Error toggling favorito:', err));
        }
    </script>

    <script th:src="@{/js/dashboard.js}"></script>
</body>

</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Eta - Resultados Busquedas</title>

    <link rel="icon" th:href="@{/images/logos/Logo.webp}" type="image/x-icon" />
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/fonts/fonts.css}">
    <link rel="stylesheet" th:href="@{/css/componentes/footer.css}">
    <link rel="stylesheet" th:href="@{/css/componentes/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/componentes/busqueda.css}">
    <link rel="stylesheet" th:href="@{/css/componentes/cartas_actividades.css}">
    <link rel="stylesheet" th:href="@{/css/cliente/resultados.css}">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
        .resultados .register-btn {
            background-color: var(--color-light-blue);

        }

        /* El botón y el SVG heredan color */
        .resultados .register-btn svg {
            color: var(--color-medium-blue);
        }
    </style>
</head>

<body class="resultados">

    <header class=" header-search bg-transparent" id="header">
        <div class="container-100 bg-transparent">
            <nav class="navbar bg-transparent">
                <a th:href="@{/}" class="brand">
                    <!-- <img th:src="@{/images/logos/etabluerrvg.webp}" alt="logo" class="logo" /> -->
                    <span id="logoText" class="text-2xl font-black tracking-tighter transition-colors text-white">
                        eta<span class="text-sm align-top">®</span>
                    </span>
                </a>
                <div class="burger" id="burger">
                    <span class="burger-line"></span>
                    <span class="burger-line"></span>
                    <span class="burger-line"></span>
                </div>
                <div class="menu" id="menu">
                    <ul class="menu-inner">

                        <div th:if="${pagina == 'detalle'}" class="menu-inner">
                            <li><a href="#imagenes"
                                    class="nav-link text-sm font-bold uppercase tracking-wider transition-colors hover:text-blue-500 text-white/90">Imagenes</a>
                            </li>
                            <li><a href="#informacion"
                                    class="nav-link text-sm font-bold uppercase tracking-wider transition-colors hover:text-blue-500 text-white/90">informacion</a>
                            </li>
                            <li><a href="#reserva"
                                    class="nav-link text-sm font-bold uppercase tracking-wider transition-colors hover:text-blue-500 text-white/90">reserva</a>
                            </li>

                        </div>
                        <div th:if="${pagina == 'indice'}" class="menu-inner">
                            <li><a href="#actividades"
                                    class="font-bold uppercase tracking-wider transition-colors hover:text-blue-500 text-white/90">Tendencias</a>
                            </li>
                            <li><a href="#actividades"
                                    class="font-bold uppercase tracking-wider transition-colors hover:text-blue-500 text-white/90">Actividades</a>
                            </li>
                        </div>

                        <li class="sign-contain" th:if="${nombreUsuario == null}">
                            <a th:href="@{/login?role=cliente}" class="btn-auth login-auth">Inicia sesión</a>
                            <a th:href="@{/registro/cliente}" class="btn-auth register-btn">
                                Únete gratis
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    class="arrow-icon">
                                    <g fill="none">
                                        <path class="arrow-path"
                                            d="M24 0v24H0V0zM12.593 23.258l-.011.002l-.071.035l-.02.004l-.014-.004l-.071-.035q-.016-.005-.024.005l-.004.01l-.017.428l.005.02l.01.013l.104.074l.015.004l.012-.004l.104-.074l.012-.016l.004-.017l-.017-.427q-.004-.016-.017-.018m.265-.113l-.013.002l-.185.093l-.01.01l-.003.011l.018.43l.005.012l.008.007l.201.093q.019.005.029-.008l.004-.014l-.034-.614q-.005-.019-.02-.022m-.715.002a.02.02 0 0 0-.027.006l-.006.014l-.034.614q.001.018.017.024l.015-.002l.201-.093l.01-.008l.004-.011l.017-.43l-.003-.012l-.01-.01z" />
                                        <path fill="#fff"
                                            d="M3.283 10.94a1.5 1.5 0 0 0 0 2.12l5.656 5.658a1.5 1.5 0 1 0 2.122-2.122L7.965 13.5H19.5a1.5 1.5 0 0 0 0-3H7.965l3.096-3.096a1.5 1.5 0 1 0-2.122-2.121z"
                                            stroke-width="0.2" stroke="#fff" />
                                    </g>
                                </svg>
                            </a>
                        </li>

                        <!--Desktop View-->
                        <li class="dropdown desktopView" th:if="${nombreUsuario != null}">
                            <a href="#" tabindex="0">
                                <img th:src="@{/images/perfiles/perfil.webp}" alt="Perfil del cliente" />
                            </a>
                            <div class="dropdown-contain">

                                <!-- Opción para Cliente -->
                                <div th:if="${userRole == 'ROLE_CLIENTE'}">
                                    <a th:href="@{/cliente/dashboard}">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                            viewBox="0 0 24 24">
                                            <g fill="#000" fill-rule="evenodd" clip-rule="evenodd" stroke-width="0.2"
                                                stroke="#000">
                                                <path
                                                    d="M16 9a4 4 0 1 1-8 0a4 4 0 0 1 8 0m-2 0a2 2 0 1 1-4 0a2 2 0 0 1 4 0" />
                                                <path
                                                    d="M12 1C5.925 1 1 5.925 1 12s4.925 11 11 11s11-4.925 11-11S18.075 1 12 1M3 12c0 2.09.713 4.014 1.908 5.542A8.99 8.99 0 0 1 12.065 14a8.98 8.98 0 0 1 7.092 3.458A9 9 0 1 0 3 12m9 9a8.96 8.96 0 0 1-5.672-2.012A6.99 6.99 0 0 1 12.065 16a6.99 6.99 0 0 1 5.689 2.92A8.96 8.96 0 0 1 12 21" />
                                            </g>
                                        </svg>
                                        Perfil
                                    </a>
                                </div>

                                <!-- Opción para Admin -->
                                <div th:if="${userRole == 'ROLE_COLABORADOR'}">
                                    <a th:href="@{/colaborador/actividades}">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                            viewBox="0 0 24 24">
                                            <g fill="#000" fill-rule="evenodd" clip-rule="evenodd" stroke-width="0.2"
                                                stroke="#000">
                                                <path
                                                    d="M16 9a4 4 0 1 1-8 0a4 4 0 0 1 8 0m-2 0a2 2 0 1 1-4 0a2 2 0 0 1 4 0" />
                                                <path
                                                    d="M12 1C5.925 1 1 5.925 1 12s4.925 11 11 11s11-4.925 11-11S18.075 1 12 1M3 12c0 2.09.713 4.014 1.908 5.542A8.99 8.99 0 0 1 12.065 14a8.98 8.98 0 0 1 7.092 3.458A9 9 0 1 0 3 12m9 9a8.96 8.96 0 0 1-5.672-2.012A6.99 6.99 0 0 1 12.065 16a6.99 6.99 0 0 1 5.689 2.92A8.96 8.96 0 0 1 12 21" />
                                            </g>
                                        </svg>
                                        Perfil
                                    </a>
                                </div>

                                <!-- Formulario de cierre de sesión -->
                                <form th:action="@{/logout}" method="post">
                                    <button type="submit" class="btn-cerraSesion">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                            viewBox="0 0 24 24">
                                            <path fill="#000"
                                                d="M6 2h9a2 2 0 0 1 2 2v1a1 1 0 0 1-2 0V4H6v16h9v-1a1 1 0 0 1 2 0v1a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2"
                                                stroke-width="0.2" stroke="#000" />
                                            <path fill="#000"
                                                d="M16.795 16.295c.39.39 1.02.39 1.41 0l3.588-3.588a1 1 0 0 0 0-1.414l-3.588-3.588a.999.999 0 0 0-1.411 1.411L18.67 11H10a1 1 0 0 0 0 2h8.67l-1.876 1.884a1 1 0 0 0 .001 1.411"
                                                stroke-width="0.2" stroke="#000" />
                                        </svg> Cerrar sesión
                                    </button>
                                </form>

                            </div>
                        </li>

                        <!--Mobile view-->
                        <div th:if="${nombreUsuario != null}" class="menu-inner mobileView">


                            <li th:if="${userRole == 'ROLE_CLIENTE'}"><a th:href="@{/cliente/dashboard}"
                                    href="#actividades"
                                    class="nav-link text-sm font-bold uppercase tracking-wider transition-colors hover:text-blue-500 text-white/90">Perfil</a>
                            </li>
                            <li th:if="${userRole == 'ROLE_COLABORADOR'}"><a th:href="@{/colaborador/actividades}"
                                    href="#actividades"
                                    class="nav-link text-sm font-bold uppercase tracking-wider transition-colors hover:text-blue-500 text-white/90">Perfil</a>
                            </li>
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="btn-cerraSesion">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                                        <path fill="#fff"
                                            d="M6 2h9a2 2 0 0 1 2 2v1a1 1 0 0 1-2 0V4H6v16h9v-1a1 1 0 0 1 2 0v1a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2"
                                            stroke-width="0.2" stroke="#fff" />
                                        <path fill="#fff"
                                            d="M16.795 16.295c.39.39 1.02.39 1.41 0l3.588-3.588a1 1 0 0 0 0-1.414l-3.588-3.588a.999.999 0 0 0-1.411 1.411L18.67 11H10a1 1 0 0 0 0 2h8.67l-1.876 1.884a1 1 0 0 0 .001 1.411"
                                            stroke-width="0.2" stroke="#fff" />
                                    </svg> Cerrar sesión
                                </button>
                            </form>
                        </div>


                    </ul>
                </div>
                <a th:href="@{/}" class="other-logo">
                    <!-- <img th:src="@{/images/logos/etabluerrvg.webp}" alt="logo" class="logo" /> -->
                    <span id="logoText" class="text-2xl font-black tracking-tighter transition-colors text-blue-600">
                        eta<span class="text-sm align-top">®</span>
                    </span>
                </a>
            </nav>
        </div>
    </header>

    <div class="search" th:fragment="buscador">

        <div class="search-container">
            <svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" {...props}>
                <path fill="currentColor"
                    d="M232.49 215.51L185 168a92.12 92.12 0 1 0-17 17l47.53 47.54a12 12 0 0 0 17-17ZM44 112a68 68 0 1 1 68 68a68.07 68.07 0 0 1-68-68">
                </path>
            </svg>
            <form th:action="@{/actividades/buscar}" th:object="${busqueda}" method="post">
                <input type="text" th:field="*{titulo}" placeholder="Buscar por título..." />
                <!-- <button type="submit" class="button-default">Buscar</button> -->
            </form>
        </div>
        <div class="filtros-container">
            <button type="submit" class="button-default"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28"
                    viewBox="0 0 24 24">
                    <path fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M22 3H2l8 10v4l4 4v-8z" />
                </svg></button>
        </div>
    </div>

    <main class="py-10">

        <section class="Trending" id="actividades">
            <div class="top-trending">
                <h2 class="h2_trendi" th:if="${filtroNombre != null and !filtroNombre.isEmpty()}">Resultados de, <a
                        href="#" class="city"> <span th:text="${filtroNombre}"></span></a></h2>

                <h2 class="h2_trendi" th:unless="${filtroNombre != null and !filtroNombre.isEmpty()}">Todas Las
                    Actividades</h2>

            </div>

            <div class="Actividades-Container">


                <a th:each="actividad : ${actividades.content}"
                    th:href="@{/resultados/{id}(id=${actividad.idActividad})}" class="Actividad-card-link">

                    <div class="Actividad-card">
                        <div class="price">$ <span th:text="${#numbers.formatDecimal(actividad.precio, 0, 0)}">10</span>
                        </div>

                        <div class="container-bookmark">
                            <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24"
                                class="bookmark">
                                <path fill="currentColor"
                                    d="M16 2H8C6.3 2 5 3.3 5 5v16c0 .2 0 .3.1.5c.3.5.9.6 1.4.4l5.5-3.2l5.5 3.2c.2.1.3.1.5.1c.6 0 1-.4 1-1V5c0-1.7-1.3-3-3-3">
                                </path>
                            </svg>
                        </div>

                        <img th:if="${actividad.imagen != null}" th:src="@{'/uploads/' + ${actividad.imagen}}"
                            alt="Imagen de la actividad" />

                        <span th:if="${actividad.imagen == null}">Sin imagen</span>

                        <div class="content-actividad">
                            <h3 th:text="${actividad.titulo}"></h3>
                            <p th:text="${actividad.ubicacion}"></p>
                        </div>
                    </div>
                </a>


                <a class="anterior-paginacion flex items-center gap-2 px-3 py-2 rounded bg-gray-200 hover:bg-gray-300"
                    th:if="${currentPage > 0}" th:href="@{/(page=${currentPage - 1})}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24">
                        <path fill="#3073b7"
                            d="m7.825 13l4.9 4.9q.3.3.288.7t-.313.7q-.3.275-.7.288t-.7-.288l-6.6-6.6q-.15-.15-.213-.325T4.426 12t.063-.375t.212-.325l6.6-6.6q.275-.275.688-.275t.712.275q.3.3.3.713t-.3.712L7.825 11H19q.425 0 .713.288T20 12t-.288.713T19 13z" />
                    </svg>

                </a>



                <a class="anterior-paginacion despues-paginacion flex items-center gap-2 px-3 py-2 rounded bg-gray-200 hover:bg-gray-300"
                    th:if="${currentPage < totalPages - 1}" th:href="@{/(page=${currentPage + 1})}">

                    <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24">
                        <path fill="#3073b7"
                            d="m7.825 13l4.9 4.9q.3.3.288.7t-.313.7q-.3.275-.7.288t-.7-.288l-6.6-6.6q-.15-.15-.213-.325T4.426 12t.063-.375t.212-.325l6.6-6.6q.275-.275.688-.275t.712.275q.3.3.3.713t-.3.712L7.825 11H19q.425 0 .713.288T20 12t-.288.713T19 13z" />
                    </svg>
                </a>


            </div>
            <span class="px-4 py-2 text-gray-700 mt-4">
                Página <strong th:text="${currentPage + 1}">1</strong> de <strong th:text="${totalPages}">1</strong>
            </span>

        </section>
        <!-- Tarjetas de actividades -->


        <!-- Paginación (igual que en main) -->
        <!-- <div class="pagination" th:if="${totalPages > 1}">
            <a th:each="p : ${pageNumbers}" th:href="@{/actividades/buscar(page=${p})}" th:text="${p + 1}"
                class="page-link" th:classappend="${p == currentPage} ? 'active'"></a>
        </div> -->


    </main>
    <div th:replace="~{componentes/footer :: footer}"></div>
    <script th:src="@{/js/componentes/navbar.js}"></script>
</body>

</html>

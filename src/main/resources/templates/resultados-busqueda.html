<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Eta - Resultados Busquedas</title>

    <link rel="icon" th:href="@{/images/logos/Logo.webp}" type="image/x-icon" />
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/fonts/fonts.css}">
    <link rel="stylesheet" th:href="@{/css/componentes/footer.css}">
    <link rel="stylesheet" th:href="@{/css/componentes/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/componentes/busqueda.css}">
    <link rel="stylesheet" th:href="@{/css/componentes/cartas_actividades.css}">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
        .resultados .register-btn {
            background-color: var(--color-light-blue);

        }

        /* El botón y el SVG heredan color */
        .resultados .register-btn svg {
            color: var(--color-medium-blue);
        }
    </style>
</head>

<body class="resultados">

    <div th:replace="~{componentes/navbar :: navbar}"></div>

    <main>



        <div th:replace="~{componentes/buscador :: buscador}"></div>


        <section class="Trending" id="actividades">
            <div class="top-trending">
                <p>Resultado</p>
                <h2 class="h2_trendi" th:if="${filtroNombre != null and !filtroNombre.isEmpty()}">Resultados de, <a
                        href="#" class="city"> <span th:text="${filtroNombre}"></span></a></h2>

                <h2 class="h2_trendi" th:unless="${filtroNombre != null and !filtroNombre.isEmpty()}">Todas Las
                    Actividades</h2>
                    
            </div>

            <div class="Actividades-Container">


                <a th:each="actividad : ${actividades.content}" th:href="@{/resultados/{id}(id=${actividad.idActividad})}"
                    class="Actividad-card-link">

                    <div class="Actividad-card">
                        <div class="price">$ <span th:text="${#numbers.formatDecimal(actividad.precio, 0, 0)}">10</span>
                        </div>

                        <div class="container-bookmark">
                            <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24"
                                class="bookmark">
                                <path fill="currentColor"
                                    d="M16 2H8C6.3 2 5 3.3 5 5v16c0 .2 0 .3.1.5c.3.5.9.6 1.4.4l5.5-3.2l5.5 3.2c.2.1.3.1.5.1c.6 0 1-.4 1-1V5c0-1.7-1.3-3-3-3">
                                </path>
                            </svg>
                        </div>

                        <img th:if="${actividad.imagen != null}" th:src="@{'/uploads/' + ${actividad.imagen}}"
                            alt="Imagen de la actividad" />

                        <span th:if="${actividad.imagen == null}">Sin imagen</span>

                        <div class="content-actividad">
                            <h3 th:text="${actividad.titulo}"></h3>
                            <p th:text="${actividad.ubicacion}"></p>
                        </div>
                    </div>
                </a>


                <a class="anterior-paginacion flex items-center gap-2 px-3 py-2 rounded bg-gray-200 hover:bg-gray-300"
                    th:if="${currentPage > 0}" th:href="@{/(page=${currentPage - 1})}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24">
                        <path fill="#3073b7"
                            d="m7.825 13l4.9 4.9q.3.3.288.7t-.313.7q-.3.275-.7.288t-.7-.288l-6.6-6.6q-.15-.15-.213-.325T4.426 12t.063-.375t.212-.325l6.6-6.6q.275-.275.688-.275t.712.275q.3.3.3.713t-.3.712L7.825 11H19q.425 0 .713.288T20 12t-.288.713T19 13z" />
                    </svg>

                </a>



                <a class="anterior-paginacion despues-paginacion flex items-center gap-2 px-3 py-2 rounded bg-gray-200 hover:bg-gray-300"
                    th:if="${currentPage < totalPages - 1}" th:href="@{/(page=${currentPage + 1})}">

                    <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24">
                        <path fill="#3073b7"
                            d="m7.825 13l4.9 4.9q.3.3.288.7t-.313.7q-.3.275-.7.288t-.7-.288l-6.6-6.6q-.15-.15-.213-.325T4.426 12t.063-.375t.212-.325l6.6-6.6q.275-.275.688-.275t.712.275q.3.3.3.713t-.3.712L7.825 11H19q.425 0 .713.288T20 12t-.288.713T19 13z" />
                    </svg>
                </a>


            </div>
            <span class="px-4 py-2 text-gray-700 mt-4">
                Página <strong th:text="${currentPage + 1}">1</strong> de <strong th:text="${totalPages}">1</strong>
            </span>

        </section>
        <!-- Tarjetas de actividades -->


        <!-- Paginación (igual que en main) -->
        <!-- <div class="pagination" th:if="${totalPages > 1}">
            <a th:each="p : ${pageNumbers}" th:href="@{/actividades/buscar(page=${p})}" th:text="${p + 1}"
                class="page-link" th:classappend="${p == currentPage} ? 'active'"></a>
        </div> -->


    </main>
    <div th:replace="~{componentes/footer :: footer}"></div>
    <script th:src="@{/js/componentes/navbar.js}"></script>
</body>

</html>

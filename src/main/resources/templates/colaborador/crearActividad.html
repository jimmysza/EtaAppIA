<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/actividad/crearActividad.css}">
    <link rel="stylesheet" th:href="@{/css/tailwind.css}">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="icon" th:href="@{/images/logos/etabluerrvg.webp}" type="image/x-icon" />
    <link rel="icon" th:href="@{/images/logos/logo.webp}" type="image/x-icon" />
    <title>ETA | Crear Actividades</title>

    <style>
        /* Estilos personalizados para el input de fecha */
        input[type="date"]::-webkit-calendar-picker-indicator {
            opacity: 0;
            position: absolute;
            right: 12px;
            cursor: pointer;
        }

        #map-wrapper {
            width: 100%;
            max-width: 100%;
            height: 200px !important;
            max-height: 200px !important;
            border-radius: 12px;
            overflow: hidden !important;
            border: 1px solid #e5e7eb;
            position: relative;
        }

        #map {
            position: absolute !important;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            z-index: 0;
        }

        .leaflet-container {
            height: 100% !important;
            width: 100% !important;
        }

        .leaflet-tile-container img {
            max-width: none !important;
        }
    </style>
</head>

<body>

    <header class="header" id="header">
        <div class="container-100">
            <nav>
                <div class="nav-logo">
                    <a th:href="@{/colaborador/actividades}" class="brand">
                        <img th:src="@{/images/logos/etawhitervg.webp}" alt="logo" class="logo" />
                    </a>
                </div>

                <div class="nav-salir">
                    <a th:href="@{/colaborador/actividades}">Salir</a>
                </div>
            </nav>
        </div>
    </header>

    <div class="w-full min-h-screen bg-gray-50 flex items-center justify-center p-4">

        <div class="bg-white rounded-2xl shadow-lg w-full max-w-4xl p-8 ">
            <!-- Header -->
            <div class="mb-4 pb-4 border-b-[3px] border-gray-200">
                <div class="flex items-center gap-3 mb-2">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2">
                        </path>
                    </svg>
                    <h1 class="text-3xl font-semibold text-gray-900">Crear Nueva Actividad</h1>
                </div>
                <p class="text-gray-500 text-base">
                    Configura una nueva actividad para ofrecer a tus clientes
                </p>
            </div>

            <form th:action="@{/colaborador/actividades/addAct}" method="post" th:object="${actividad}"
                enctype="multipart/form-data" id="activityForm">
                <div class="mb-2">
                    <label class="block text-gray-900 font-bold mb-2">
                        Imagen de la Actividad <span class="text-red-500">*</span>
                    </label>
                </div>

                <!-- File Upload Area -->
                <label for="imagenFile" id="dropZone"
                    class="border-2 border-dashed border-gray-300 bg-gray-50 rounded-xl p-12 mb-6 text-center transition-colors cursor-pointer hover:border-gray-400 block">
                    <input type="file" id="imagenFile" name="imagenFile" class="hidden" accept="image/*"
                        data-required="true">
                    <svg class="w-10 h-10 mx-auto mb-4 text-gray-400" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12">
                        </path>
                    </svg>
                    <p id="fileName" class="text-gray-700 text-base mb-1">
                        Selecciona una imagen o arrastra aquí
                    </p>
                    <p class="text-gray-400 text-sm">
                        JPG, PNG o WEBP, tamaño máximo 10MB
                    </p>
                </label>

                <!-- Título y Fecha -->
                <div class="grid grid-cols-1 gap-4 mb-6">
                    <div>
                        <label class="block text-gray-900 font-bold mb-2">
                            Título de la Actividad <span class="text-red-500">*</span>
                        </label>
                        <input type="text" id="titulo" th:field="*{titulo}"
                            placeholder="Ej: Tour por el centro histórico" minlength="3" maxlength="200"
                            data-required="true"
                            class="w-full px-4 py-3 bg-gray-50 border-0 rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <p class="text-xs text-gray-500 mt-1">Los títulos cortos dan más reservas</p>
                    </div>
                </div>

                <!-- Descripción -->
                <div class="mb-6">
                    <label class="block text-gray-900 font-bold mb-2">
                        Descripción <span class="text-red-500">*</span>
                    </label>
                    <textarea id="descripcion" th:field="*{descripcion}"
                        placeholder="Describe tu actividad de la manera más sencilla" rows="4" minlength="10"
                        maxlength="200" data-required="true"
                        class="w-full px-4 py-3 bg-gray-50 border-0 rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
                </div>

                <!-- Precio y Ubicación -->
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block text-gray-900 font-bold mb-2">
                            Precio por Cupo <span class="text-red-500">*</span>
                        </label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 font-medium">COP</span>
                            <input type="number" id="precio" th:field="*{precio}" placeholder="120000" min="4000"
                                max="99999999"
                                class="w-full pl-16 pr-4 py-3 bg-gray-50 border-0 rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>
                    <div>
                        <label class="block text-gray-900 font-bold mb-2">
                            Ubicación <span class="text-red-500">*</span>
                        </label>
                        <input type="text" id="ubicacion" th:field="*{ubicacion}"
                            placeholder="Dirección de la actividad" maxlength="255" data-required="true"
                            class="w-full px-4 py-3 bg-gray-50 border-0 rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <p class="text-xs text-gray-500 mt-1">Solo compartida después de la reserva</p>
                    </div>
                </div>

                <!-- Mapa para seleccionar ubicación -->

                <div class="mb-6">
                    <label class="block text-gray-900 font-bold mb-2">
                        Ubicación en el Mapa <span class="text-red-500">*</span>
                    </label>
                    <p class="text-sm text-gray-500 mb-3">Haz clic en el mapa para marcar la ubicación exacta de tu
                        actividad</p>

                    <div id="map-wrapper">
                        <div id="map"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mt-3">
                        <div>
                            <label class="block text-gray-600 text-sm mb-1">Latitud</label>
                            <input type="text" id="latitudDisplay" readonly
                                class="w-full px-3 py-2 bg-gray-100 border-0 rounded-lg text-gray-700 text-sm"
                                placeholder="Selecciona en el mapa">
                            <input type="hidden" id="latitud" th:field="*{latitud}">
                        </div>
                        <div>
                            <label class="block text-gray-600 text-sm mb-1">Longitud</label>
                            <input type="text" id="longitudDisplay" readonly
                                class="w-full px-3 py-2 bg-gray-100 border-0 rounded-lg text-gray-700 text-sm"
                                placeholder="Selecciona en el mapa">
                            <input type="hidden" id="longitud" th:field="*{longitud}">
                        </div>
                    </div>
                </div>

                <!-- Categorías -->
                <div class="mb-6">
                    <label class="block text-gray-900 font-bold mb-2">
                        Categoría <span class="text-red-500">*</span>
                    </label>
                    <select id="categoria" th:field="*{categoria}" data-required="true"
                        class="w-full px-4 py-3 bg-gray-50 border-0 rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="" disabled selected>Selecciona una categoría</option>
                        <option th:each="cat : ${categorias}" th:value="${cat.idCategoria}" th:text="${cat.nombre}">
                        </option>
                    </select>
                </div>

                <!-- Idiomas -->
                <div class="mb-6">
                    <label class="block text-gray-900 font-bold mb-2">
                        Idioma <span class="text-red-500">*</span>
                    </label>
                    <select id="idioma" th:field="*{idioma}" data-required="true"
                        class="w-full px-4 py-3 bg-gray-50 border-0 rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="" disabled selected>Selecciona un idioma</option>
                        <option th:each="idio : ${idiomas}" th:value="${idio.idIdioma}" th:text="${idio.nombre}">
                        </option>
                    </select>
                </div>

                <!-- Incluye -->
                <div class="mb-6">
                    <label class="block text-gray-900 font-bold mb-2">
                        ¿Qué incluye?
                    </label>
                    <textarea id="incluye" th:field="*{incluye}"
                        placeholder="Ej: Guía turístico, refrigerio, transporte" rows="3" data-required="true"
                        class="w-full px-4 py-3 bg-gray-50 border-0 rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
                </div>

                <!-- Normas -->
                <div class="mb-6">
                    <label class="block text-gray-900  mb-2 font-bold">
                        Normas
                    </label>
                    <textarea id="normas" th:field="*{normas}"
                        placeholder="Ej: Puntualidad, no fumar, respetar indicaciones" rows="3" data-required="true"
                        class="w-full px-4 py-3 bg-gray-50 border-0 rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
                </div>

                <!-- Condiciones -->
                <div class="mb-6">
                    <label class="block text-gray-900 font-bold mb-2">
                        Condiciones
                    </label>
                    <textarea id="condiciones" th:field="*{condiciones}"
                        placeholder="Ej: Cancelación 24h antes, edad mínima, estado físico" rows="3"
                        data-required="true"
                        class="w-full px-4 py-3 bg-gray-50 border-0 rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
                </div>

                <!-- 
                <div class="mb-6">
                    <label class="block text-gray-900 font-bold mb-2">
                        Imágenes Adicionales
                    </label>
                    <label for="imagenesExtra" id="dropZoneExtra"
                        class="border-2 border-dashed border-gray-300 bg-gray-50 rounded-xl p-8 mb-2 text-center transition-colors cursor-pointer hover:border-gray-400 block">
                        <input type="file" id="imagenesExtra" name="imagenesExtra" class="hidden" accept="image/*"
                            multiple>
                        <svg class="w-8 h-8 mx-auto mb-3 text-gray-400" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
                            </path>
                        </svg>
                        <p id="fileNameExtra" class="text-gray-700 text-sm mb-1">
                            Selecciona imágenes adicionales o arrastra aquí
                        </p>
                        <p class="text-gray-400 text-xs">
                            Puedes seleccionar varias imágenes a la vez (opcional)
                        </p>
                    </label>
                </div> -->

                <!-- Buttons -->
                <div class="flex justify-end gap-3">
                    <a th:href="@{/colaborador/actividades}"
                        class="px-6 py-3 text-gray-700 font-medium rounded-lg hover:bg-gray-100 transition-colors">
                        Cancelar
                    </a>
                    <button type="submit"
                        class="px-6 py-3 bg-gray-900 text-white font-medium rounded-lg hover:bg-gray-800 transition-colors flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2">
                            </path>
                        </svg>
                        Crear Actividad
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Mensaje de error -->
    <div id="errorMsg" class="alert alert-danger">...</div>

    <script>

        const alertDanger = document.querySelector('.alert-danger');
        // File upload handling
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('imagenFile');
        const fileName = document.getElementById('fileName');
        let selectedFile = null;

        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                selectedFile = e.target.files[0];
                fileName.textContent = selectedFile.name;
            }
        });

        // Drag and drop
        dropZone.addEventListener('dragenter', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-gray-300', 'bg-gray-50');
            dropZone.classList.add('border-blue-500', 'bg-blue-50');
        });

        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-blue-500', 'bg-blue-50');
            dropZone.classList.add('border-gray-300', 'bg-gray-50');
        });

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-blue-500', 'bg-blue-50');
            dropZone.classList.add('border-gray-300', 'bg-gray-50');

            if (e.dataTransfer.files[0]) {
                selectedFile = e.dataTransfer.files[0];
                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(e.dataTransfer.files[0]);
                fileInput.files = dataTransfer.files;
                fileName.textContent = selectedFile.name;
            }
        });



        function showAlert(alertElement, text) {
            if (!alertElement) return; // Si no existe, no hace nada
            alertElement.classList.add('showAnimationAppearFromTop');
            alertElement.textContent = text;
            setTimeout(() => {
                alertElement.style.display = 'none';
            }, 5000); // Ocultar a los 5s
        }


        // Form validation
        document.getElementById('activityForm').addEventListener('submit', (e) => {
            const titulo = document.getElementById('titulo').value.trim();
            const descripcion = document.getElementById('descripcion').value.trim();
            const precio = document.getElementById('precio').value;
            const ubicacion = document.getElementById('ubicacion').value.trim();
            const categoria = document.getElementById('categoria').value;
            const idioma = document.getElementById('idioma').value;

            if (!titulo || !descripcion || !precio || !ubicacion || !categoria || !idioma) {
                e.preventDefault();
                showAlert(alertDanger, 'Por favor completa todos los campos obligatorios (*)');
                return false;
            }

            if (!selectedFile) {
                e.preventDefault();
                showAlert(alertDanger, 'Por favor selecciona una imagen para la actividad');
                return false;
            }
        });
    </script>
    <div id="errorMsg" class="alert z-100 alert-danger">...</div>

    <script th:src="@{/js/alert.js}"></script>

    <!-- Script para el mapa de ubicación -->
    <script>
        let map = null;
        let marker = null;

        function initMap() {
            if (map !== null) {
                map.remove();
                map = null;
                marker = null;
            }

            map = L.map('map').setView([10.3910, -75.4794], 13);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);

            map.on('click', function(e) {
                const lat = e.latlng.lat;
                const lng = e.latlng.lng;

                document.getElementById('latitud').value = lat;
                document.getElementById('longitud').value = lng;
                document.getElementById('latitudDisplay').value = lat.toFixed(6);
                document.getElementById('longitudDisplay').value = lng.toFixed(6);

                if (marker) {
                    marker.setLatLng(e.latlng);
                } else {
                    marker = L.marker(e.latlng, { draggable: true }).addTo(map);
                    marker.on('dragend', function(event) {
                        const pos = event.target.getLatLng();
                        document.getElementById('latitud').value = pos.lat;
                        document.getElementById('longitud').value = pos.lng;
                        document.getElementById('latitudDisplay').value = pos.lat.toFixed(6);
                        document.getElementById('longitudDisplay').value = pos.lng.toFixed(6);
                    });
                }
            });

            const lat = document.getElementById('latitud').value;
            const lng = document.getElementById('longitud').value;
            if (lat && lng && !isNaN(lat) && !isNaN(lng)) {
                const latlng = L.latLng(parseFloat(lat), parseFloat(lng));
                marker = L.marker(latlng, { draggable: true }).addTo(map);
                map.setView(latlng, 15);
                document.getElementById('latitudDisplay').value = parseFloat(lat).toFixed(6);
                document.getElementById('longitudDisplay').value = parseFloat(lng).toFixed(6);
                marker.on('dragend', function(event) {
                    const pos = event.target.getLatLng();
                    document.getElementById('latitud').value = pos.lat;
                    document.getElementById('longitud').value = pos.lng;
                    document.getElementById('latitudDisplay').value = pos.lat.toFixed(6);
                    document.getElementById('longitudDisplay').value = pos.lng.toFixed(6);
                });
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(initMap, 300);
        });

        window.addEventListener('resize', function() {
            if (map) map.invalidateSize();
        });
    </script>
</body>

</html>

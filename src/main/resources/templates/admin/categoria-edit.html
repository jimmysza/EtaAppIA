<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/tailwind.css}">
    <link rel="icon" th:href="@{/images/logos/isotipo.webp}" type="image/x-icon" />
    <title>ETA | Editar Categoría</title>
    <style>
        .card-shell {
            max-width: 720px;
            width: 100%;
        }
    </style>
</head>

<body>

    <section class="container-manager">
        <div th:replace="~{componentes/sidebarAdmin :: sidebarAdmin}"></div>

        <main class="main-content">
            <div class="header_db">
                <div class="flex gap-3">
                    <nav aria-label="Breadcrumb">
                        <ol class="breadcrumbs" itemscope itemtype="https://schema.org/BreadcrumbList">
                            <li itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
                                <a itemprop="item" href="/admin/dashboard">
                                    <span itemprop="name">Inicio</span>
                                </a>
                                <meta itemprop="position" content="1" />
                            </li>

                            <li itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
                                <a itemprop="item" class="text-blue-600 font-bold">
                                    <span itemprop="name">Editar Categoría</span>
                                </a>
                                <meta itemprop="position" content="2" />
                            </li>

                        </ol>
                    </nav>
                </div>
            </div>

            <div class="Actividades-Container">
                <div class="w-full flex items-center justify-center p-4">
                    <div class="bg-white rounded-2xl shadow-lg p-8 card-shell" style="width:100%; max-width:720px;">
                        <div class="mb-4 pb-4 border-b-[3px] border-gray-200">
                            <div class="flex items-center gap-3 mb-2">
                                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2">
                                    </path>
                                </svg>
                                <h1 class="text-2xl font-semibold text-gray-900">Editar Categoría</h1>
                            </div>
                            <p class="text-gray-500 text-sm">Actualiza el nombre y/o la imagen de la categoría.</p>
                        </div>

                        <form th:action="@{/admin/categorias/editar}" th:object="${categoria}" method="post" enctype="multipart/form-data">
                            <input type="hidden" th:field="*{idCategoria}" />

                            <div class="mb-4">
                                <label class="block text-gray-900 font-medium mb-2">Nombre de la Categoría <span class="text-red-500">*</span></label>
                                <input type="text" th:field="*{nombre}" required
                                    class="w-full px-4 py-3 bg-gray-50 border-0 rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#23aae2]" />
                            </div>

                            <div class="mb-4">
                                <label class="block text-gray-900 font-medium mb-2">Imagen actual</label>
                                <div th:if="${categoria.imagen != null and !#strings.isEmpty(categoria.imagen)}" class="mb-2">
                                    <img th:src="@{${categoria.imagen}}" th:alt="${categoria.nombre}"
                                        style="width:160px; height:160px; object-fit:cover; border-radius:10px; border:1px solid #e5e7eb;" />
                                </div>
                                <div th:if="${categoria.imagen == null or #strings.isEmpty(categoria.imagen)}" class="text-gray-500 mb-2">Sin imagen</div>

                                <label for="imagenFile" id="dropZone"
                                    class="border-2 border-dashed border-gray-300 bg-gray-50 rounded-xl p-6 text-center transition-colors cursor-pointer hover:border-gray-400 block">
                                    <input type="file" id="imagenFile" name="imagenFile" class="hidden" accept="image/*">
                                    <p class="text-gray-700 text-base mb-1">Selecciona una imagen o arrastra aquí</p>
                                    <p class="text-gray-400 text-sm">JPG, PNG o WEBP, tamaño máximo 10MB</p>
                                </label>
                            </div>

                            <div class="flex gap-3 justify-end mt-6">
                                <a th:href="@{/admin/categorias}" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg">Cancelar</a>
                                <button type="submit" class="px-4 py-2 bg-[#23aae2] text-white rounded-lg">Actualizar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

        </main>
    </section>

</body>

</html>

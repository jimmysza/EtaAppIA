<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" th:href="@{/images/logos/logo.webp}" type="image/x-icon" />


    <!-- CSS con rutas Thymeleaf -->
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/fonts/fonts.css}">
    <link rel="stylesheet" th:href="@{/css/auth/login.css}">

    <title>Eta - Inicio Sesion - Cliente - Eventos Toures Actividades</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>

    <div th:if="${param.registrarse}" class="alert alert-info">
        Debes registrarte o iniciar sesión para acceder.
    </div>

    <!-- Mensajes flash -->
    <div th:if="${exito}" class="alert alert-success">
        <span th:text="${exito}"></span>
    </div>

    <div th:if="${error}" class="alert alert-danger">
        <span th:text="${error}"></span>
    </div>

    <div th:if="${param.expired}">
        <div class="alert alert-info">La Sesion es expiro</div>
    </div>

    <div class="container-100">
        <nav>
            <a class="flex justify-center items-center cursor-pointer" th:href="@{/}">
                <img th:src="@{/images/logos/etawhitervg.webp}" class="logo" alt="logo" loading="lazy" />

            </a>
            <ul class="nav-links">

                <li th:if="${role == null}"><a th:href="@{/registro/cliente}">Registrarse</a></li>
                <li th:if="${role == 'cliente'}"><a th:href="@{/registro/cliente}">Registrarse</a></li>
                <li th:if="${role == 'colaborador'}"><a th:href="@{/registro/colaborador}">Registrarse</a></li>
            </ul>
        </nav>
    </div>

    <div class="login-root">
        <div class="login-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                <path fill="#000"
                    d="M12 21v-2h7V5h-7V3h7q.825 0 1.413.588T21 5v14q0 .825-.587 1.413T19 21zm-2-4l-1.375-1.45l2.55-2.55H3v-2h8.175l-2.55-2.55L10 7l5 5z" />
            </svg>
        </div>

        <h1 class="p-bold">Ingresa con tu usuario</h1>
        <p class="text-sma">Disfruta de todas las actividades</p>

        <form th:action="@{/login}" method="post">
            <div class="input">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                    <path fill="#BFC2CF"
                        d="M22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2zm-2 0l-8 5l-8-5zm0 12H4V8l8 5l8-5z" />
                </svg>
                <input type="text" placeholder="Email" id="username" name="username" autofocus="autofocus" required />
            </div>

            <div class="input relative">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                    <path fill="#BFC2Cf"
                        d="M20 12c0-1.103-.897-2-2-2h-1V7c0-2.757-2.243-5-5-5S7 4.243 7 7v3H6c-1.103 0-2 .897-2 2v8c0 1.103.897 2 2 2h12c1.103 0 2-.897 2-2zM9 7c0-1.654 1.346-3 3-3s3 1.346 3 3v3H9z" />
                </svg>

                <input type="password" placeholder="Contraseña" required id="password" name="password"
                    autofocus="autofocus" />
                <!-- Botón para mostrar/ocultar contraseña -->
                <button type="button" id="togglePassLogin"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 password-toggle ">


                    <!-- Ojo cerrado -->
                    <svg id="eyeClosedLogin" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 " fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.05 10.05 0 011.658-3.248M9.88 9.88A3 3 0 0114.12 14.12M20.12 20.12L3.88 3.88" />
                    </svg>
                </button>
            </div>
            <!-- <div class="forgot-password">
                <a href="#">olvidaste la contraseña?</a>
            </div> -->

            <button type="submit" class="login-button">Unete</button>

            <p class="register">¿no tienes una cuenta?
                <a th:if="${role == 'cliente'}" th:href="@{/registro/cliente}">registrarse</a>
                <a th:if="${role == 'colaborador'}" th:href="@{/registro/colaborador}">registrarse</a>
                <a th:if="${role == null}" th:href="@{/registro/cliente}">registrarse</a>
            </p>
            <div class="continua flex items-center mt-8 mb-1">
                <div class="flex-grow border-t border-gray-300"></div>
                <span class="divide px-3 text-gray-500 text-sm">O continua con</span>
                <div class="flex-grow border-t border-gray-300"></div>
            </div>

            <div class="social-login">
                <a href="/oauth2/authorization/google" class="log-Auth">

                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 48 48">
                        <path fill="#ffc107"
                            d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4C12.955 4 4 12.955 4 24s8.955 20 20 20s20-8.955 20-20c0-1.341-.138-2.65-.389-3.917" />
                        <path fill="#ff3d00"
                            d="m6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4C16.318 4 9.656 8.337 6.306 14.691" />
                        <path fill="#4caf50"
                            d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.9 11.9 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44" />
                        <path fill="#1976d2"
                            d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917" />
                    </svg>Google</a>
            </div>
        </form>
    </div>

    <script th:src="@{/js/ingreso.js}"></script>
    <script th:src="@{/js/contraseñaMostrar.js}"></script>
    <script th:src="@{/js/alert.js}"></script>
</body>

</html>

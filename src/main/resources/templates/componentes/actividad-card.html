<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
    <a th:fragment="actividadCard(actividad, favoritosIds, mostrarFavorito, categoriaTexto, idiomaTexto)"
        class="card group flex h-full flex-col overflow-hidden rounded-[1.75rem] border border-slate-200 bg-white shadow-sm transition-all duration-300 hover:-translate-y-1 hover:border-slate-300 hover:shadow-2xl"
        th:href="@{/actividad/{slug}-{id}(slug=${#strings.replace(#strings.toLowerCase(actividad.titulo),' ', '-')},id=${actividad.idActividad})}">

        <div class="relative aspect-[4/3] overflow-hidden bg-slate-100">
            <img th:if="${actividad.imagen != null}" th:src="@{'/uploads/' + ${actividad.imagen}}"
                alt="Imagen de la actividad"
                class="object-cover w-full h-full transition-transform duration-500 group-hover:scale-105">

            <div th:if="${actividad.imagen == null}"
                class="flex items-center justify-center w-full h-full text-sm font-semibold bg-gradient-to-br from-slate-200 to-slate-100 text-slate-500">
                Sin imagen
            </div>

            <div class="absolute inset-x-0 bottom-0 h-28 bg-gradient-to-t from-slate-950/60 to-transparent"></div>

            <div class="absolute flex flex-wrap gap-2 left-4 top-4">
                <span
                    class="inline-flex items-center rounded-full bg-white/90 px-3 py-1 text-[11px] font-bold uppercase tracking-[0.18em] text-slate-700 backdrop-blur"
                    th:text="${categoriaTexto != null ? categoriaTexto : 'Sin categoría'}">
                    Categoría
                </span>
                <span
                    class="inline-flex items-center rounded-full bg-slate-950/80 px-3 py-1 text-[11px] font-semibold uppercase tracking-[0.18em] text-white backdrop-blur"
                    th:text="${idiomaTexto != null ? idiomaTexto : 'Sin idioma'}">
                    Idioma
                </span>
            </div>

            <button th:if="${mostrarFavorito}" type="button"
                class="absolute inline-flex items-center justify-center transition-transform rounded-full shadow-sm btn-fav right-4 top-4 h-9 w-9 bg-white/90 text-slate-700 backdrop-blur hover:scale-110 hover:bg-white"
                th:data-id="${actividad.idActividad}"
                onclick="event.preventDefault(); event.stopPropagation(); toggleFav(this);">
                <svg class="w-5 h-5 fav-icon"
                    th:classappend="${favoritosIds != null and favoritosIds.contains(actividad.idActividad)} ? ' text-red-500' : ' text-slate-700'"
                    th:fill="${favoritosIds != null and favoritosIds.contains(actividad.idActividad)} ? 'currentColor' : 'none'"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                </svg>
            </button>

            <div
                class="absolute bottom-4 left-4 inline-flex items-center gap-2 rounded-full bg-white/95 px-3 py-1.5 text-xs font-semibold text-slate-700 shadow-sm backdrop-blur">
                <span class="inline-flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-amber-400"></span>
                    <span
                        th:text="${actividad.calificacion != null ? actividad.calificacion : 'Sin calificación'}">0</span>
                </span>
                <span class="text-slate-300">•</span>
                <span
                    th:text="${(actividad.cantidadComentario != null ? actividad.cantidadComentario : 0)} + ' reseñas'">0
                    reseñas</span>
            </div>
        </div>

        <div class="flex flex-col flex-1 gap-3 p-4 sm:p-5">
            <h3 class="text-lg font-bold tracking-tight line-clamp-2 text-slate-900" th:text="${actividad.titulo}">
                Título</h3>

            <p th:if="${actividad.descripcion != null and !#strings.isEmpty(actividad.descripcion)}"
                class="text-sm leading-6 line-clamp-2 text-slate-500" th:text="${actividad.descripcion}">
                Descripción de la actividad
            </p>

            <div class="flex items-end mt-auto">
                <div class="min-w-0">
                    <p class="text-[11px] font-semibold uppercase tracking-[0.22em] text-slate-400">Precio</p>
                    <p class="text-xl font-black text-black"
                        th:text="${'COP ' + #numbers.formatDecimal(actividad.precioConsumidorSafe, 0, 'POINT', 0, 'COMMA')}">
                        COP 0
                    </p>
                </div>
            </div>
        </div>
    </a>
</body>

</html>

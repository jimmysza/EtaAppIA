<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

    <section th:fragment="preguntasFrecuentes"
        th:if="${actividad != null and actividad.preguntasFrecuentes != null and !#lists.isEmpty(actividad.preguntasFrecuentes)}"
        class="faq-section">

        <div class="faq-grid">

            <!-- Columna izquierda: título -->
            <!-- <div class="faq-left">
            <p class="faq-eyebrow">Antes de reservar</p>
            <h3 class="faq-titulo">
                Preguntas frecuentes sobre
                <span th:text="${actividad.titulo}">la actividad</span>
            </h3>
            <p class="faq-sub">
                Resuelve las dudas más comunes antes de confirmar tu reserva.
            </p>
        </div> -->

            <div class="faq-left">
                <div class="lg:sticky lg:top-20">
                    <h3 class="text-4xl md:text-3xl font-bold text-text-primary mb-4">
                        Preguntas frecuentes sobre
                        <span class="text-blue-600" th:text="${actividad.titulo}">la actividad</span>
                    </h3>
                    <p class="text-text-secondary leading-relaxed">
                        Resuelve las dudas mas comunes antes de reservar.
                    </p>
                </div>
            </div>

            <!-- Columna derecha: acordeón -->
            <div class="faq-list">
                <div th:each="faq : ${actividad.preguntasFrecuentes}" class="faq-item">
                    <button class="faq-btn" onclick="toggleFAQ(this)" aria-expanded="false">
                        <span class="faq-pregunta" th:text="${faq.pregunta}">Pregunta frecuente</span>
                        <span class="faq-chevron">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                    d="M19 9l-7 7-7-7" />
                            </svg>
                        </span>
                    </button>
                    <div class="faq-content">
                        <div class="faq-respuesta">
                            <p th:text="${faq.respuesta}">Respuesta frecuente</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </section>

</body>

</html>

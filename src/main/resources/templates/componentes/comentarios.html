<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
    <section id="reseñas" class="reseñas" th:fragment="reseñas">
        <!---Reseña Titulo-->
        <div class="contain-title-reseña">
            <h3 class="c-t-r-20">Reseñas de <span th:text="${actividad.titulo}"></span></h3>
        </div>


        <!--Reseñas Actividad-->
        <div class="container-reseña">


            <div class="button-default btn_add">

                <a class="flex gap-2 items-center justify-center text-open-add" id="open-add-modal">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#fff"
                            d="M12 4c4.411 0 8 3.589 8 8s-3.589 8-8 8s-8-3.589-8-8s3.589-8 8-8m0-2C6.477 2 2 6.477 2 12s4.477 10 10 10s10-4.477 10-10S17.523 2 12 2m5 9h-4V7h-2v4H7v2h4v4h2v-4h4z"
                            stroke-width="0.5" stroke="#fff" />
                    </svg>
                    Agregar Comentario</a>
            </div>
            <!--Buscador de Reseñas-->
            <!--   <div class="search-reseñas">
                <div class="search-container-reseñas">
                    <svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" {...props}>
                        <path fill="currentColor"
                            d="M232.49 215.51L185 168a92.12 92.12 0 1 0-17 17l47.53 47.54a12 12 0 0 0 17-17ZM44 112a68 68 0 1 1 68 68a68.07 68.07 0 0 1-68-68">
                        </path>
                    </svg>
                    <input type="text" placeholder="Buscar eventos, lugares, viajes..." />
                </div>
            </div> -->

            <!--Excepcion si no hay comentarios-->
            <div th:if="${comentarios.totalElements == 0}">
                <p>No hay comentarios todavía.</p>
            </div>

            <!--Carta de reseña-->
            <div class="card-reseña" th:each="comentario : ${comentarios.content}">
                <div class="personal_info">
                    <!--img reseña-->
                    <img th:src="@{/images/perfiles/perfil.webp}" class="img-reseña" alt="Perfil del cliente" />
                    <div class="name">
                        <a href="" th:text="${comentario.cliente.usuario.nombre}"></a>
                        <div class="flex align-center gap-2">

                            <div class="calificacion flex center">
                                <!-- ⭐ Estrellas llenas -->
                                <span
                                    th:each="i : ${#numbers.sequence(1, T(java.lang.Integer).parseInt(comentario.calificacion))}">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                                        <path fill="#000"
                                            d="m12 17.275l-4.15 2.5q-.275.175-.575.15t-.525-.2t-.35-.437t-.05-.588l1.1-4.725L3.775 10.8q-.25-.225-.312-.513t.037-.562t.3-.45t.55-.225l4.85-.425l1.875-4.45q.125-.3.388-.45t.537-.15t.537.15t.388.45l1.875 4.45l4.85.425q.35.05.55.225t.3.45t.038.563t-.313.512l-3.675 3.175l1.1 4.725q.075.325-.05.588t-.35.437t-.525.2t-.575-.15z"
                                            stroke-width="0.2" stroke="#000" />
                                    </svg>
                                </span>

                                <!-- ☆ Estrellas vacías -->
                                <span
                                    th:each="i : ${#numbers.sequence(1, 5 - T(java.lang.Integer).parseInt(comentario.calificacion))}">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                                        <path fill="#000"
                                            d="m8.85 16.825l3.15-1.9l3.15 1.925l-.825-3.6l2.775-2.4l-3.65-.325l-1.45-3.4l-1.45 3.375l-3.65.325l2.775 2.425zm3.15.45l-4.15 2.5q-.275.175-.575.15t-.525-.2t-.35-.437t-.05-.588l1.1-4.725L3.775 10.8q-.25-.225-.312-.513t.037-.562t.3-.45t.55-.225l4.85-.425l1.875-4.45q.125-.3.388-.45t.537-.15t.537.15t.388.45l1.875 4.45l4.85.425q.35.05.55.225t.3.45t.038.563t-.313.512l-3.675 3.175l1.1 4.725q.075.325-.05.588t-.35.437t-.525.2t-.575-.15zm0-5.025"
                                            stroke-width="0.2" stroke="#000" />
                                    </svg>
                                </span>
                            </div>






                            <div class="info_date flex center gap-3">
                                <p th:text="${#temporals.format(comentario.fechaComentario, 'dd MMM yyyy')}"></p>
                            </div>
                        </div>
                    </div>

                </div>
                <div class="card-reseña-text">
                    <p th:text="${comentario.texto}">Hace mucho calor en la pared sin sombra, así que hay que ir
                        temprano. Tiene buenas vistas y no
                        hay mucha gente.</p>
                    <div class="flex location gap-3">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                            <path fill="currentColor"
                                d="M12 12q.825 0 1.413-.587T14 10t-.587-1.412T12 8t-1.412.588T10 10t.588 1.413T12 12m0 7.35q3.05-2.8 4.525-5.087T18 10.2q0-2.725-1.737-4.462T12 4T7.738 5.738T6 10.2q0 1.775 1.475 4.063T12 19.35M12 22q-4.025-3.425-6.012-6.362T4 10.2q0-3.75 2.413-5.975T12 2t5.588 2.225T20 10.2q0 2.5-1.987 5.438T12 22m0-12" />
                        </svg>
                        <a th:text="${actividad.ubicacion}"></a>
                    </div>
                </div>
            </div>

            <!-- Botón Página Anterior -->
            <!-- Botón Página Anterior -->
            <a class="button-default" th:if="${currentPage > 0}"
                th:href="@{/detalle/{id}(id=${id}, page=${currentPage - 1})} + '#reseñas'">
                Anterior
            </a>

            <!-- Botón Página Siguiente -->
            <a class="button-default" th:if="${currentPage < totalPages - 1}"
                th:href="@{/detalle/{id}(id=${id}, page=${currentPage + 1})} + '#reseñas'">
                Siguiente
            </a>





        </div>


        <div class="modal modal-add">

            <form th:action="@{/comentarios/agregar/{idActividad}(idActividad=${actividad.idActividad})}" method="post">

                <div class="form-heading">
                    <h2>Agregar Comentario</h2>
                    <p>Agrega tus Comentario</p>
                    <span class=" close-modal close-btn-modal">&times;</span>
                </div>

                <div class="inputs-form">

                    <label for="comentario">Comentario <span class="red">*</span></label>
                    <textarea name="texto" id="comentario" placeholder="Escribe tu comentario..." required></textarea>


                    <label for="calificacion">Calificación: <span class="red">*</span></label>
                    <select name="calificacion" id="calificacion" required>
                        <option value="1">1 ⭐</option>
                        <option value="2">2 ⭐⭐</option>
                        <option value="3">3 ⭐⭐⭐</option>
                        <option value="4">4 ⭐⭐⭐⭐</option>
                        <option value="5">5 ⭐⭐⭐⭐⭐</option>
                    </select>

                    <div class="btnSubmit">
                        <button type="submit" class="btn-submit button-default
                        ">Enviar Comentario</button>
                    </div>

                </div>

            </form>

        </div>



    </section>
    </div>
</body>

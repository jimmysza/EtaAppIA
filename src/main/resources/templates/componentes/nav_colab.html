<header id="header" th:fragment="nav_colab" class="nav-colab-shell">

    <div class="nav-colab-container">
        <nav class="nav-colab-bar">

            <a th:href="@{/colaborador/actividades}" class="nav-colab-brand">
                <span class="nav-colab-logo-wrap">
                    <img th:src="@{/images/logos/Logo.webp}" alt="ETA" class="nav-colab-logo" loading="lazy">
                </span>

                <span class="nav-colab-copy hidden sm:flex">
                    <strong>ETA</strong>
                    <small>Panel colaborador</small>
                </span>
            </a>

            <div class="nav-colab-links hidden md:flex" aria-label="Navegación de actividad">
                <a th:href="@{/colaborador/detalle/{id}(id=${actividad.idActividad})}" class="nav-colab-link">
                    Información
                </a>

                <a th:if="${actividad != null}"
                    th:href="@{/colaborador/disponibilidades/{idActividad}(idActividad=${actividad.idActividad})}"
                    class="nav-colab-link">
                    Disponibilidad
                </a>

                <a th:if="${actividad != null}"
                    th:href="@{/colaborador/reservas/{idActividad}(idActividad=${actividad.idActividad})}"
                    class="nav-colab-link">
                    Reservas
                </a>
            </div>

            <a th:href="@{/colaborador/actividades}" class="nav-colab-exit">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
                    <path fill="currentColor"
                        d="M10 17v-3H3v-4h7V7l5 5zm1 4v-2h8V5h-8V3h8q.825 0 1.413.588T21 5v14q0 .825-.587 1.413T19 21z" />
                </svg>
                <span>Salir</span>
            </a>

        </nav>
    </div>

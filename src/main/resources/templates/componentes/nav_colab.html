<header id="header" th:fragment="nav_colab"
    class="w-full bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">

    <div class="max-w-7xl mx-auto px-0">
        <nav class="flex items-center justify-between h-16">

            <!-- Logo -->
            <div class="flex items-center gap-3">

                <a th:href="@{/colaborador/actividades}" class="flex items-center gap-3 hover:opacity-90 transition">

                    <img th:src="@{/images/logos/logo.webp}" alt="logo"
                        class="w-16 h-16 object-contain rounded-xl bg-white p-1 shadow-sm" style="width:44px;
                        height:44px;
                        max-width:44px;
                        max-height:44px;
                        display:block;
                        transform: translateX(-40px);" loading="lazy">

                    <div class="hidden sm:block">
                        <h1 class="text-sm font-bold text-gray-800 leading-none">
                            ETA
                        </h1>

                        <span class="text-xs text-gray-500">
                            Panel colaborador
                        </span>
                    </div>

                </a>
            </div>

            <!-- Enlaces -->
            <div class="hidden md:flex items-center gap-2">

                <a th:href="@{/colaborador/detalle/{id}(id=${actividad.idActividad})}"
                    class="px-4 py-2 rounded-xl text-sm font-medium text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition">
                    Información
                </a>

                <a th:if="${actividad != null}"
                    th:href="@{/colaborador/disponibilidades/{idActividad}(idActividad=${actividad.idActividad})}"
                    class="px-4 py-2 rounded-xl text-sm font-medium text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition">
                    Disponibilidad
                </a>

                <a th:if="${actividad != null}"
                    th:href="@{/colaborador/reservas/{idActividad}(idActividad=${actividad.idActividad})}"
                    class="px-4 py-2 rounded-xl text-sm font-medium text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition">
                    Reservas
                </a>

            </div>

            <!-- Botón salir -->
            <div>
                <a th:href="@{/colaborador/actividades}" class="inline-flex items-center gap-2 px-4 py-2 rounded-xl 
                           bg-blue-600 text-white text-sm font-semibold 
                           hover:bg-blue-700 transition shadow-sm">

                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">

                        <path fill="currentColor"
                            d="M10 17v-3H3v-4h7V7l5 5zm1 4v-2h8V5h-8V3h8q.825 0 1.413.588T21 5v14q0 .825-.587 1.413T19 21z" />
                    </svg>

                    Salir
                </a>
            </div>

        </nav>
    </div>
</header>

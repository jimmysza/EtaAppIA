<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
    <header class="header" id="header" th:fragment="navbar">
        <div class="container-100">
            <nav class="navbar">
                <a th:href="@{/}" class="brand brand-pill" aria-label="Ir al inicio de ETA">
                    <img th:src="@{/images/logos/isotipoM.webp}" alt="etaApp" class="brand-mark" />
                    <span class="brand-copy">
                        <span class="brand-name">etaApp</span>
                        <span class="brand-tag">Cartagena curated</span>
                    </span>
                </a>

                <button class="burger" id="burger" type="button" aria-label="Abrir menu" aria-expanded="false" aria-controls="menu">
                    <span class="burger-line"></span>
                    <span class="burger-line"></span>
                    <span class="burger-line"></span>
                </button>

                <div class="menu" id="menu">
                    <div class="menu-shell">
                        <ul class="menu-inner menu-links">
                            <li th:if="${pagina == 'detalle'}"><a href="#imagenes" class="menu-link">Imagenes</a></li>
                            <li th:if="${pagina == 'detalle'}"><a href="#informacion" class="menu-link">Informacion</a></li>
                            <li th:if="${pagina == 'detalle'}"><a href="#reserva" class="menu-link">Reserva</a></li>
                            <li th:if="${pagina == 'indice'}"><a href="#populares" class="menu-link">Tendencias</a></li>
                            <li th:if="${pagina == 'indice'}"><a href="#populares" class="menu-link">Actividades</a></li>
                        </ul>

                        <div class="menu-actions" th:if="${nombreUsuario == null}">
                            <a th:href="@{/login?role=cliente}" class="btn-auth login-auth">Inicia sesion</a>
                            <a th:href="@{/registro/cliente}" class="btn-auth register-btn">Registrate</a>
                        </div>

                        <div class="account-cluster" th:if="${nombreUsuario != null}">
                            <div class="dropdown desktopView">
                                <button type="button" class="account-trigger" aria-label="Abrir menu de perfil">
                                    <span class="account-meta">
                                        <small>Cuenta</small>
                                        <strong th:text="${nombreUsuario}">Usuario</strong>
                                    </span>
                                    <img th:src="@{/images/perfiles/perfil.webp}" alt="Perfil del cliente" />
                                </button>
                                <div class="dropdown-contain">
                                    <div th:if="${userRole == 'ROLE_CLIENTE'}">
                                        <a th:href="@{/cliente/dashboard}">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                                                <circle cx="12" cy="7" r="4" />
                                            </svg>
                                            Perfil
                                        </a>
                                    </div>
                                    <div th:if="${userRole == 'ROLE_COLABORADOR'}">
                                        <a th:href="@{/colaborador/actividades}">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                                                <circle cx="12" cy="7" r="4" />
                                            </svg>
                                            Perfil
                                        </a>
                                    </div>
                                    <form th:action="@{/logout}" method="post">
                                        <button type="submit" class="btn-cerraSesion">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                                                <polyline points="16 17 21 12 16 7" />
                                                <line x1="21" y1="12" x2="9" y2="12" />
                                            </svg>
                                            Cerrar sesion
                                        </button>
                                    </form>
                                </div>
                            </div>

                            <div class="mobile-account mobileView">
                                <p class="mobile-account__label">Conectado como</p>
                                <strong class="mobile-account__name" th:text="${nombreUsuario}">Usuario</strong>
                                <a th:if="${userRole == 'ROLE_CLIENTE'}" th:href="@{/cliente/dashboard}" class="menu-link mobile-account__link">Perfil</a>
                                <a th:if="${userRole == 'ROLE_COLABORADOR'}" th:href="@{/colaborador/actividades}" class="menu-link mobile-account__link">Perfil</a>
                                <form th:action="@{/logout}" method="post">
                                    <button type="submit" class="btn-cerraSesion">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                                            <polyline points="16 17 21 12 16 7" />
                                            <line x1="21" y1="12" x2="9" y2="12" />
                                        </svg>
                                        Cerrar sesion
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </nav>
        </div>
    </header>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body>
    <div class="sb-root" th:fragment="sideBarCliente">

        <!-- ── Logo ── -->
        <div class="sb-logo">
            <a th:href="@{/}" class="sb-logo__link">
                <img th:src="@{/images/logos/Logo.webp}" alt="etaApp logo" class="sb-logo__img" />
                <span class="sb-logo__name">etaApp</span>
            </a>
        </div>

        <!-- ── Nav ── -->
        <nav class="sb-nav">
            <p class="sb-section-title">Plataforma</p>

            <a th:href="@{/cliente/dashboard}" class="sb-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
                <span>Ver reservas</span>
            </a>

            <a th:href="@{/cliente/informacion}" class="sb-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                </svg>
                <span>Informacion Personal</span>
            </a>

            <a th:href="@{/cliente/favoritos}" class="sb-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                </svg>
                <span>Favoritos</span>
            </a>
        </nav>

        <!-- ── Spacer ── -->
        <div class="sb-spacer"></div>

        <!-- ── User card ── -->
        <div class="sb-user-card">
            <div class="sb-user-card__avatar">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                </svg>
            </div>
            <div class="sb-user-card__info">
                <h1 class="sb-user-card__role">Cliente</h1>
                <p class="sb-user-card__name" th:text="${nombreUsuario}">usuario</p>
            </div>
        </div>

        <!-- ── Bottom links ── -->
        <div class="sb-bottom">
            <a th:href="@{/}" class="sb-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                <span>Inicio</span>
            </a>

            <a th:href="@{/logout}" class="sb-link sb-link--danger" sec:authorize="isAuthenticated()">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                <span>Cerrar Sesion</span>
            </a>
        </div>

    </div>

</body>

</html>

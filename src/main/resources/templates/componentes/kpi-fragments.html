<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- Fragmento: Tarjeta métrica con valor, etiqueta y badge de variación -->
    <div th:fragment="kpi-metric-card(label, valor, variacion, tipo)" class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
        <div class="flex items-center justify-between mb-2">
            <span class="text-sm font-medium text-gray-600 uppercase tracking-wider" th:text="${label}">Label</span>
            <span th:if="${variacion != null}" 
                  th:classappend="${variacion >= 0 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}"
                  class="px-2 py-1 rounded-full text-xs font-semibold">
                <span th:text="${variacion >= 0 ? '↑' : '↓'}"></span>
                <span th:text="${#numbers.formatDecimal(Math.abs(variacion), 1, 1)}">0.0</span>%
            </span>
        </div>
        <div class="text-3xl font-bold text-gray-900" 
             th:text="${tipo == 'dinero' ? '$' + #numbers.formatDecimal(valor, 1, 2) : #numbers.formatInteger(valor, 1, 'COMMA')}">
            0
        </div>
    </div>

    <!-- Fragmento: Tarjeta métrica simple sin variación -->
    <div th:fragment="kpi-simple-card(label, valor, tipo, colorClass)" class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
        <span class="text-sm font-medium text-gray-600 uppercase tracking-wider block mb-2" th:text="${label}">Label</span>
        <div th:classappend="${colorClass != null ? colorClass : 'text-gray-900'}"
             class="text-3xl font-bold" 
             th:text="${tipo == 'dinero' ? '$' + #numbers.formatDecimal(valor, 1, 2) : 
                       tipo == 'porcentaje' ? #numbers.formatDecimal(valor, 1, 1) + '%' :
                       tipo == 'decimal' ? #numbers.formatDecimal(valor, 1, 1) :
                       #numbers.formatInteger(valor, 1, 'COMMA')}">
            0
        </div>
    </div>

    <!-- Fragmento: Tarjeta con calificación (estrellas) -->
    <div th:fragment="kpi-calificacion-card(label, calificacion)" class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
        <span class="text-sm font-medium text-gray-600 uppercase tracking-wider block mb-2" th:text="${label}">Label</span>
        <div class="flex items-center gap-2">
            <span class="text-3xl font-bold text-gray-900" th:text="${#numbers.formatDecimal(calificacion, 1, 1)}">0.0</span>
            <div class="flex text-amber-500">
                <svg th:each="i : ${#numbers.sequence(1, 5)}" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" 
                     th:classappend="${i <= calificacion ? 'fill-current' : 'fill-none stroke-current'}">
                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                </svg>
            </div>
        </div>
    </div>

    <!-- Fragmento: Encabezado de sección -->
    <div th:fragment="section-header(titulo, descripcion)" class="mb-6">
        <h2 class="text-xl font-bold text-gray-900" th:text="${titulo}">Título</h2>
        <p th:if="${descripcion != null}" class="text-sm text-gray-600 mt-1" th:text="${descripcion}">Descripción</p>
    </div>

    <!-- Fragmento: Barra horizontal con valor -->
    <div th:fragment="kpi-bar(label, valor, maxValor, colorClass)" class="mb-4">
        <div class="flex justify-between items-center mb-2">
            <span class="text-sm font-medium text-gray-700" th:text="${label}">Label</span>
            <span class="text-sm font-bold text-gray-900" th:text="${valor}">0</span>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-3">
            <div th:classappend="${colorClass != null ? colorClass : 'bg-blue-600'}"
                 class="h-3 rounded-full transition-all duration-300"
                 th:style="'width: ' + ${maxValor > 0 ? (valor * 100.0 / maxValor) : 0} + '%'">
            </div>
        </div>
    </div>

    <!-- Fragmento: Mensaje de sin datos -->
    <div th:fragment="no-data-message" class="bg-gray-50 border border-gray-200 rounded-lg p-8 text-center">
        <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
        <p class="mt-4 text-gray-600 font-medium">Sin datos para este período</p>
        <p class="mt-2 text-sm text-gray-500">Selecciona otro período o espera a que se generen actividades</p>
    </div>

</body>
</html>

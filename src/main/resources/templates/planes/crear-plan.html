<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Plan del Día - Eta</title>

    <link rel="icon" th:href="@{/images/logos/isotipo.webp}" type="image/x-icon" />
    <link rel="stylesheet" th:href="@{/fonts/fonts.css}">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/componentes/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/componentes/footer.css}">
    <link rel="stylesheet" th:href="@{/css/planes/crear-plan.css}">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-50">
    <div th:replace="~{componentes/navbar :: navbar}"></div>

    <main class="pt-24 pb-12">
        <div class="max-w-4xl mx-auto px-4">
            <!-- Header -->
            <div class="text-center mb-8">
                <h1 class="text-4xl font-black text-gray-900 mb-4">
                    Crea tu <span class="text-purple-600">Plan del Día</span>
                </h1>
                <p class="text-lg text-gray-600">
                    Diseña una ruta temática con tus actividades favoritas y compártela con la comunidad
                </p>
            </div>

            <!-- Formulario -->
            <form th:action="${rolActual == 'CLIENTE' ? '/cliente/planes/crear' : '/colaborador/planes/crear'}"
                method="post" enctype="multipart/form-data" th:object="${form}" onsubmit="return prepararEnvio()"
                class="bg-white rounded-2xl shadow-lg border-2 border-gray-200 p-8">

                <!-- Sección 1: Información del Plan -->
                <div class="mb-8">
                    <h2 class="text-2xl font-bold text-gray-900 mb-6 flex items-center gap-2">
                        <span
                            class="flex-shrink-0 w-8 h-8 rounded-full bg-purple-100 text-purple-700 flex items-center justify-center font-black">1</span>
                        Información del Plan
                    </h2>

                    <div class="space-y-4">
                        <!-- Título -->
                        <div>
                            <label for="titulo" class="block text-sm font-semibold text-gray-700 mb-2">
                                Título del Plan <span class="text-red-500">*</span>
                            </label>
                            <input type="text" id="titulo" th:field="*{titulo}" required maxlength="200"
                                placeholder="Ej: Día Cultural en el Centro Histórico"
                                class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition-all">
                            <p class="text-xs text-gray-500 mt-1">Máximo 200 caracteres</p>
                        </div>

                        <!-- Descripción -->
                        <div>
                            <label for="descripcion" class="block text-sm font-semibold text-gray-700 mb-2">
                                Descripción
                            </label>
                            <textarea id="descripcion" th:field="*{descripcion}" rows="4"
                                placeholder="Describe tu plan del día en Cartagena..."
                                class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition-all resize-none"></textarea>
                        </div>

                        <!-- Tipo y Duración -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label for="tipo" class="block text-sm font-semibold text-gray-700 mb-2">
                                    Tipo de Plan
                                </label>
                                <select id="tipo" th:field="*{tipo}"
                                    class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition-all">
                                    <option value="">Selecciona un tipo</option>
                                    <option value="Cultural">Cultural</option>
                                    <option value="Aventura">Aventura</option>
                                    <option value="Gastronómico">Gastronómico</option>
                                    <option value="Romántico">Romántico</option>
                                    <option value="Familiar">Familiar</option>
                                    <option value="Relajación">Relajación</option>
                                </select>
                            </div>

                            <div>
                                <label for="duracionEstimada" class="block text-sm font-semibold text-gray-700 mb-2">
                                    Duración Estimada
                                </label>
                                <input type="text" id="duracionEstimada" th:field="*{duracionEstimada}"
                                    placeholder="Ej: 8 horas, Día completo"
                                    class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition-all">
                            </div>
                        </div>

                        <!-- Imagen de Portada -->
                        <div>
                            <label for="imagenPortada" class="block text-sm font-semibold text-gray-700 mb-2">
                                Imagen de Portada
                            </label>
                            <div class="flex items-center gap-4">
                                <label for="imagenPortada"
                                    class="flex-1 px-4 py-8 border-2 border-dashed border-gray-300 rounded-xl hover:border-purple-500 transition-all cursor-pointer text-center">
                                    <div class="text-gray-600">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48"
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                            class="mx-auto mb-2 text-gray-400">
                                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                            <polyline points="21 15 16 10 5 21"></polyline>
                                        </svg>
                                        <span class="font-semibold">Click para subir imagen</span>
                                        <p class="text-xs text-gray-500 mt-1">PNG, JPG hasta 10MB</p>
                                    </div>
                                </label>
                                <input type="file" id="imagenPortada" th:field="*{imagenPortada}" accept="image/*"
                                    class="hidden" onchange="mostrarNombreArchivo(this)">
                            </div>
                            <p id="nombreArchivo" class="text-sm text-gray-600 mt-2"></p>
                        </div>
                    </div>
                </div>

                <!-- Sección 2: Actividades del Plan -->
                <div class="mb-8">
                    <h2 class="text-2xl font-bold text-gray-900 mb-6 flex items-center gap-2">
                        <span
                            class="flex-shrink-0 w-8 h-8 rounded-full bg-purple-100 text-purple-700 flex items-center justify-center font-black">2</span>
                        Actividades del Plan
                    </h2>

                    <!-- Buscador de Actividades -->
                    <div class="mb-6">
                        <label for="buscadorActividades" class="block text-sm font-semibold text-gray-700 mb-2">
                            Buscar Actividades
                        </label>
                        <div class="relative">
                            <input type="text" id="buscadorActividades" placeholder="Busca actividades por nombre..."
                                class="w-full px-4 py-3 pl-12 border-2 border-gray-300 rounded-xl focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2"
                                class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.35-4.35"></path>
                            </svg>
                        </div>

                        <!-- Resultados de búsqueda -->
                        <div id="resultadosBusqueda" class="mt-4 space-y-2 max-h-64 overflow-y-auto hidden"></div>
                    </div>

                    <!-- Lista de Actividades Seleccionadas -->
                    <div id="actividadesSeleccionadas" class="space-y-3">
                        <p class="text-gray-500 text-center py-8 border-2 border-dashed border-gray-300 rounded-xl">
                            No has seleccionado actividades todavía. Busca y añade actividades arriba.
                        </p>
                    </div>

                    <!-- Campo oculto para JSON -->
                    <input type="hidden" id="actividadesJson" name="actividadesJson" th:field="*{actividadesJson}">
                </div>

                <!-- Botones de acción -->
                <div class="flex gap-4">
                    <button type="button" onclick="window.history.back()"
                        class="flex-1 px-6 py-3 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold rounded-xl transition-all">
                        Cancelar
                    </button>
                    <button type="submit"
                        class="flex-1 px-6 py-3 bg-purple-600 hover:bg-purple-700 text-white font-bold rounded-xl transition-all shadow-lg hover:shadow-xl">
                        Crear Plan
                    </button>
                </div>
            </form>
        </div>
    </main>

    <div th:replace="~{componentes/footer :: footer}"></div>

    <script th:src="@{/js/planes/crear-plan.js}"></script>
</body>

</html>

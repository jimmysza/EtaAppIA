<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Planes - Eta</title>

    <link rel="icon" th:href="@{/images/logos/isotipo.webp}" type="image/x-icon" />
    <link rel="stylesheet" th:href="@{/fonts/fonts.css}">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="icon" th:href="@{/images/logos/isotipo.webp}" type="image/x-icon" />
    <link rel="stylesheet" th:href="@{/css/componentes/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/componentes/footer.css}">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-50">
    <div th:replace="~{componentes/navbar :: navbar}"></div>

    <main class="pt-24 pb-12">
        <div class="max-w-6xl mx-auto px-4">

            <!-- Header -->
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h1 class="text-4xl font-black text-gray-900 mb-2">
                        Mis <span class="text-purple-600">Planes</span>
                    </h1>
                    <p class="text-gray-600">
                        Planes del día que has creado
                    </p>
                </div>

                <a th:href="${rolCreador == 'CLIENTE'} ? '/cliente/planes/crear' : '/colaborador/planes/crear'"
                    class="inline-flex items-center gap-2 bg-purple-600 hover:bg-purple-700 text-white font-bold px-6 py-3 rounded-full transition-all shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Crear Nuevo Plan
                </a>
            </div>

            <!-- Lista de Planes -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div th:each="plan : ${planes}"
                    class="bg-white rounded-2xl shadow-lg hover:shadow-xl transition-all border-2 border-gray-200 hover:border-purple-500 overflow-hidden group">

                    <!-- Imagen -->
                    <div class="relative h-48 overflow-hidden">
                        <img th:if="${plan.imagenPortada != null}" th:src="@{'/uploads/' + ${plan.imagenPortada}}"
                            alt="Portada"
                            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
                        <div th:if="${plan.imagenPortada == null}"
                            class="w-full h-full bg-gradient-to-br from-purple-400 to-purple-600 flex items-center justify-center">
                            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24"
                                fill="none" stroke="white" stroke-width="1.5">
                                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                <circle cx="12" cy="10" r="3"></circle>
                            </svg>
                        </div>

                        <!-- Badge tipo -->
                        <div class="absolute top-4 right-4 px-3 py-1 rounded-full text-xs font-bold text-white shadow-lg"
                            th:classappend="${plan.tipo == 'Cultural'} ? 'bg-blue-500' : (${plan.tipo == 'Aventura'} ? 'bg-green-500' : 'bg-orange-500')">
                            <span th:text="${plan.tipo}">Cultural</span>
                        </div>
                    </div>

                    <div class="p-6">
                        <h3 class="text-xl font-black text-gray-900 mb-2 line-clamp-2" th:text="${plan.titulo}">Título
                            del Plan</h3>

                        <!-- Stats -->
                        <div class="flex items-center gap-4 text-sm text-gray-600 mb-4">
                            <div class="flex items-center gap-1">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                    <circle cx="12" cy="10" r="3"></circle>
                                </svg>
                                <span th:text="${#lists.size(plan.actividades)} + ' paradas'">5 paradas</span>
                            </div>

                            <div class="flex items-center gap-1">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                                <span th:text="${plan.vistas}">0</span>
                            </div>
                        </div>

                        <!-- Botón ver -->
                        <a th:href="@{'/planes/' + ${plan.id}}"
                            class="block w-full text-center bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-xl transition-all">
                            Ver Plan
                        </a>
                    </div>
                </div>
            </div>

            <!-- Empty State -->
            <div th:if="${#lists.isEmpty(planes)}"
                class="text-center py-16 bg-white rounded-2xl border-2 border-dashed border-gray-300">
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1.5" class="mx-auto mb-4 text-gray-400">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                </svg>
                <p class="text-xl font-semibold text-gray-500 mb-4">No has creado ningún plan todavía</p>
                <a th:href="${rolCreador == 'CLIENTE'} ? '/cliente/planes/crear' : '/colaborador/planes/crear'"
                    class="inline-flex items-center gap-2 bg-purple-600 hover:bg-purple-700 text-white font-bold px-6 py-3 rounded-full transition-all">
                    Crear mi primer plan
                </a>
            </div>
        </div>
    </main>

    <div th:replace="~{componentes/footer :: footer}"></div>
</body>

</html>

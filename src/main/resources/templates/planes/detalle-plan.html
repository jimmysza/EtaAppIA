<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${plan.titulo} + ' - Eta'">Detalle del Plan - Eta</title>

    <link rel="icon" th:href="@{/images/logos/isotipo.webp}" type="image/x-icon" />
    <link rel="stylesheet" th:href="@{/fonts/fonts.css}">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/componentes/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/componentes/footer.css}">
    <link rel="stylesheet" th:href="@{/css/planes/planes.css}">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-50">
    <div th:replace="~{componentes/navbar :: navbar}"></div>

    <main class="pt-24 pb-12">
        <div class="max-w-6xl mx-auto px-4">

            <!-- Header con imagen de portada -->
            <div class="relative mb-8 rounded-3xl overflow-hidden shadow-2xl">
                <div class="h-96 relative">
                    <img th:if="${plan.imagenPortada != null}" th:src="@{'/uploads/' + ${plan.imagenPortada}}"
                        alt="Portada del plan" class="w-full h-full object-cover">
                    <div th:if="${plan.imagenPortada == null}"
                        class="w-full h-full bg-gradient-to-br from-purple-500 to-purple-700"></div>

                    <!-- Overlay con título -->
                    <div
                        class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/40 to-transparent flex items-end">
                        <div class="p-8 text-white w-full">
                            <div class="flex items-center gap-3 mb-4">
                                <span class="px-4 py-2 bg-white/20 backdrop-blur-sm rounded-full text-sm font-bold"
                                    th:text="${plan.tipo}">Cultural</span>
                                <span
                                    class="px-4 py-2 bg-white/20 backdrop-blur-sm rounded-full text-sm font-bold flex items-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                        fill="none" stroke="currentColor" stroke-width="2">
                                        <circle cx="12" cy="12" r="10"></circle>
                                        <polyline points="12 6 12 12 16 14"></polyline>
                                    </svg>
                                    <span th:text="${plan.duracionEstimada}">8 horas</span>
                                </span>
                            </div>
                            <h1 class="text-5xl font-black mb-3" th:text="${plan.titulo}">Título del Plan</h1>
                            <p class="text-lg opacity-90 max-w-3xl" th:text="${plan.descripcion}">Descripción del
                                plan...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Info del creador -->
            <div class="mb-8">
                <div th:if="${plan.rolCreador == 'COLABORADOR'}"
                    class="inline-flex items-center gap-3 px-6 py-3 rounded-xl bg-blue-100 text-blue-700">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                        fill="currentColor">
                        <path
                            d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" />
                    </svg>
                    <div>
                        <p class="text-sm font-semibold">Colaborador Verificado</p>
                        <p class="text-xs opacity-80">Creado por <span th:text="${plan.nombreCreador}"
                                class="font-bold">Nombre</span></p>
                    </div>
                </div>

                <div th:if="${plan.rolCreador == 'CLIENTE'}"
                    class="inline-flex items-center gap-3 px-6 py-3 rounded-xl bg-green-100 text-green-700">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    <div>
                        <p class="text-sm font-semibold">Comunidad</p>
                        <p class="text-xs opacity-80">Creado por <span th:text="${plan.nombreCreador}"
                                class="font-bold">Nombre</span></p>
                    </div>
                </div>
            </div>

            <!-- Mapa y Actividades -->
            <div class="grid grid-cols-1 lg:grid-cols-5 gap-8">

                <!-- Mapa -->
                <div class="lg:col-span-2">
                    <div class="sticky top-24">
                        <h2 class="text-2xl font-bold text-gray-900 mb-4">Ruta en el Mapa</h2>
                        <div class="bg-white rounded-2xl shadow-lg overflow-hidden border-2 border-gray-200">
                            <div id="map" style="height: 500px; width: 100%;"></div>
                        </div>
                    </div>
                </div>

                <!-- Lista de Actividades -->
                <div class="lg:col-span-3">
                    <h2 class="text-2xl font-bold text-gray-900 mb-6">Itinerario Detallado</h2>

                    <div class="space-y-6">
                        <div th:each="actividad : ${plan.actividades}"
                            class="bg-white rounded-2xl shadow-lg border-2 border-gray-200 overflow-hidden hover:border-purple-500 transition-all">

                            <div class="p-6">
                                <div class="flex items-start gap-4">
                                    <!-- Número de parada -->
                                    <div
                                        class="flex-shrink-0 w-12 h-12 rounded-full bg-purple-600 text-white flex items-center justify-center font-black text-xl">
                                        <span th:text="${actividad.orden}">1</span>
                                    </div>

                                    <div class="flex-1">
                                        <!-- Hora sugerida -->
                                        <div th:if="${actividad.horaSugerida != null && !actividad.horaSugerida.isEmpty()}"
                                            class="inline-flex items-center gap-2 px-3 py-1 bg-purple-100 text-purple-700 rounded-full text-sm font-semibold mb-3">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14"
                                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <circle cx="12" cy="12" r="10"></circle>
                                                <polyline points="12 6 12 12 16 14"></polyline>
                                            </svg>
                                            <span th:text="${actividad.horaSugerida}">9:00 AM</span>
                                        </div>

                                        <!-- Nombre y categoría -->
                                        <h3 class="text-xl font-black text-gray-900 mb-1">
                                            <a target="_blank" th:href="@{'/actividad/' + ${actividad.slugActividad} + '-' + ${actividad.idActividad}}"
                                                class="hover:text-purple-600 transition-colors"
                                                th:text="${actividad.nombreActividad}">Nombre Actividad</a>
                                        </h3>
                                        <p class="text-sm text-gray-600 mb-3" th:text="${actividad.categoriaActividad}">
                                            Categoría</p>

                                        <!-- Nota personalizada -->
                                        <div th:if="${actividad.notaPersonalizada != null && !actividad.notaPersonalizada.isEmpty()}"
                                            class="bg-amber-50 border-l-4 border-amber-400 p-3 rounded-lg mb-3">
                                            <p class="text-sm text-amber-900 italic"
                                                th:text="'💡 ' + ${actividad.notaPersonalizada}">Nota...</p>
                                        </div>

                                        <!-- Precio -->
                                        <div class="flex items-center gap-4">
                                            <span class="text-2xl font-black text-purple-600">
                                                $<span
                                                    th:text="${#numbers.formatDecimal(actividad.precioConsumidor, 0, 'COMMA', 0, 'POINT')}">50,000</span>
                                            </span>
                                            <a target="_blank" th:href="@{'/actividad/' + ${actividad.slugActividad} + '-' + ${actividad.idActividad}}"
                                                class="px-4 py-2 bg-purple-600 hover:bg-purple-700 text-white font-semibold rounded-lg transition-all">
                                                Ver Detalles →
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Botón volver -->
            <div class="mt-12 text-center">
                <a href="/planes"
                    class="inline-flex items-center gap-2 px-6 py-3 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold rounded-xl transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Volver a Planes
                </a>
            </div>
        </div>
    </main>

    <div th:replace="~{componentes/footer :: footer}"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Datos del plan para el mapa -->
    <script th:inline="javascript">
        /*<![CDATA[*/
        const planData = /*[[${plan}]]*/ {};
        /*]]>*/
    </script>

    <script>
        // Mapa para un solo plan
        document.addEventListener('DOMContentLoaded', function () {
            const map = L.map('map').setView([10.391049, -75.479426], 13);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap',
                maxZoom: 18,
            }).addTo(map);

            const puntos = [];

            if (planData && planData.actividades) {
                planData.actividades.forEach((actividad, index) => {
                    if (actividad.latitud && actividad.longitud) {
                        const latlng = [actividad.latitud, actividad.longitud];
                        puntos.push(latlng);

                        const markerHtml = `
                            <div class="custom-marker">
                                ${actividad.orden}
                            </div>
                        `;

                        const marker = L.marker(latlng, {
                            icon: L.divIcon({
                                html: markerHtml,
                                className: 'custom-div-icon',
                                iconSize: [32, 32],
                                iconAnchor: [16, 16]
                            })
                        }).addTo(map);

                        marker.bindPopup(`
                            <div class="map-popup">
                                <h4>${actividad.nombreActividad}</h4>
                                <p><strong>Hora:</strong> ${actividad.horaSugerida || 'No especificada'}</p>
                            </div>
                        `);
                    }
                });

                if (puntos.length > 1) {
                    L.polyline(puntos, {
                        color: '#7c3aed',
                        weight: 4,
                        opacity: 0.7
                    }).addTo(map);
                }

                if (puntos.length > 0) {
                    map.fitBounds(puntos, { padding: [50, 50] });
                }
            }
        });
    </script>

    <!-- ETA Assistant Chatbot Widget -->
    <div th:replace="~{componentes/chat-widget :: chatWidget(actividadId=${null})}"></div>

</body>

</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividades Cercanas - ETA</title>

    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/componentes/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/componentes/footer.css}">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <style>
        #mapaLeaflet {
            height: 520px;
            width: 100%;
        }

        .activity-card {
            transition: border-color 0.15s, transform 0.15s;
        }

        .activity-card:hover {
            border-color: #111;
            transform: translateY(-1px);
        }

        .hide-scrollbar {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body class="bg-gray-50">
    <div th:replace="~{componentes/navbar :: navbar}"></div>

    <main class="max-w-[1350px] mx-auto px-4 sm:px-6 py-10">

        <!-- Hero -->
        <div class="mb-8">
            <div
                class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-orange-100 text-orange-700 font-semibold text-sm mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                </svg>
                Actividades Cercanas
            </div>
            <h1 class="text-4xl md:text-5xl font-black text-gray-900 leading-tight">
                Cerca<br class="sm:hidden"> de ti
            </h1>
            <p class="mt-2 text-gray-500 text-base max-w-md">
                Experiencias turísticas a pocos kilómetros de tu ubicación actual.
            </p>
        </div>

        <!-- Controles -->
        <div class="flex flex-wrap items-center gap-3 mb-6">
            <button id="btnUbicacion"
                class="inline-flex items-center gap-2 bg-gray-950 hover:bg-gray-800 text-white font-semibold text-sm px-5 py-3 rounded-full transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <span id="btnTexto">Usar mi ubicación</span>
            </button>

            <div
                class="flex items-center gap-3 flex-1 min-w-[220px] max-w-sm bg-white border border-gray-200 rounded-full px-4 py-2.5">
                <span class="text-sm text-gray-500 whitespace-nowrap">Radio</span>
                <input type="range" id="sliderRadio" min="1" max="40" value="3" step="1" class="flex-1" disabled>
                <span id="labelRadio" class="text-sm font-semibold text-gray-900 min-w-[40px] text-right">3 km</span>
            </div>
        </div>

        <!-- Grid principal -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-5 items-start">

            <!-- Mapa -->
            <div class="lg:col-span-2">
                <div class="bg-white border border-gray-200 rounded-2xl overflow-hidden">
                    <div id="mapaLeaflet"></div>
                </div>
            </div>

            <!-- Panel resultados -->
            <div class="lg:col-span-1">
                <div class="bg-white border border-gray-200 rounded-2xl p-5">

                    <div class="flex items-baseline justify-between mb-4">
                        <h2 class="text-lg font-bold text-gray-900">Resultados</h2>
                        <p id="contadorResultados" class="text-sm text-gray-400">
                            Activa tu ubicación
                        </p>
                    </div>

                    <!-- Estado inicial -->
                    <div id="estadoInicial" class="py-14 flex flex-col items-center gap-3 text-center">
                        <div class="w-12 h-12 rounded-2xl bg-gray-100 flex items-center justify-center">
                            <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                        </div>
                        <p class="text-sm text-gray-500 leading-relaxed">
                            Activa tu ubicación para<br>descubrir actividades cerca
                        </p>
                    </div>

                    <!-- Lista tarjetas -->
                    <div id="listaTarjetas" class="space-y-2.5 hidden max-h-[460px] overflow-y-auto hide-scrollbar">
                    </div>

                    <!-- Estado vacío -->
                    <div id="estadoVacio" class="py-14 flex flex-col items-center gap-3 text-center hidden">
                        <div class="w-12 h-12 rounded-2xl bg-gray-100 flex items-center justify-center">
                            <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </div>
                        <p class="text-sm text-gray-500" id="mensajeVacio">
                            Sin actividades en este radio.<br>Intenta ampliar la búsqueda.
                        </p>
                    </div>

                    <!-- Cargando -->
                    <div id="estadoCargando" class="py-14 flex flex-col items-center gap-3 text-center hidden">
                        <div class="w-8 h-8 border-2 border-gray-900 border-t-transparent rounded-full animate-spin">
                        </div>
                        <p class="text-sm text-gray-500">Buscando actividades...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="pt-12"></div>

    <div th:replace="~{componentes/footer :: footer}"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script th:src="@{/js/alert.js}"></script>
    <script th:src="@{/js/componentes/navbar.js}"></script>
    <script th:src="@{/js/mapa-cercanas.js}"></script>
    <script th:src="@{/js/componentes/Activitycards.js}"></script>

    <script>
        const slider = document.getElementById('sliderRadio');
        const label = document.getElementById('labelRadio');
        if (slider && label) {
            slider.addEventListener('input', () => label.textContent = slider.value + ' km');
        }
    </script>
</body>

</html>
